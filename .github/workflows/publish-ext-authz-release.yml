name: Publish ext-authz Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Existing release tag or commit to build"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/budgetanalyzer/ext-authz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref || github.ref }}

      - name: Extract release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          release_ref="${{ inputs.release_ref || github.ref_name }}"
          release_name="${release_ref##refs/tags/}"
          version="${release_name#v}"
          if [[ -z "${version}" || "${version}" == "${release_name}" ]]; then
            echo "Expected a v-prefixed release ref, got ${release_ref}." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./ext-authz
          file: ./ext-authz/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}

      - name: Print digest-pinned reference
        shell: bash
        run: |
          echo "${IMAGE_NAME}:${{ steps.release.outputs.version }}@${{ steps.build.outputs.digest }}"
