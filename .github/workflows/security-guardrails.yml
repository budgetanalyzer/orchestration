name: Security Guardrails

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  static-security-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate changed shell syntax
        run: |
          bash -n scripts/guardrails/check-phase-7-image-pinning.sh
          bash -n scripts/bootstrap/install-verified-tool.sh
          bash -n scripts/lib/pinned-tool-versions.sh
          bash -n scripts/ops/render-istio-egress-config.sh
          bash -n scripts/guardrails/verify-phase-7-static-manifests.sh

      - name: Run static security guardrails
        run: ./scripts/guardrails/verify-phase-7-static-manifests.sh

      - name: Prove bad fixtures are rejected
        run: ./scripts/guardrails/verify-phase-7-static-manifests.sh --self-test
