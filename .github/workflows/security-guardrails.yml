name: Security Guardrails

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/security-guardrails.yml'
      - '.kube-linter.yaml'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/**'
      - 'kubernetes/**'
      - 'scripts/**'
      - 'setup.sh'
      - 'tests/security-guardrails/**'
      - 'tests/shared/Dockerfile.test-env'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/security-guardrails.yml'
      - '.kube-linter.yaml'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/**'
      - 'kubernetes/**'
      - 'scripts/**'
      - 'setup.sh'
      - 'tests/security-guardrails/**'
      - 'tests/shared/Dockerfile.test-env'
  workflow_dispatch:

jobs:
  static-security-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate changed shell syntax
        run: |
          bash -n scripts/dev/check-phase-7-image-pinning.sh
          bash -n scripts/dev/install-verified-tool.sh
          bash -n scripts/dev/lib/pinned-tool-versions.sh
          bash -n scripts/dev/verify-phase-7-static-manifests.sh

      - name: Run static Phase 7 guardrails
        run: ./scripts/dev/verify-phase-7-static-manifests.sh

      - name: Prove bad fixtures are rejected
        run: ./scripts/dev/verify-phase-7-static-manifests.sh --self-test
