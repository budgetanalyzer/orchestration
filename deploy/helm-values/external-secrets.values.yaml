# Hardened single-node values for the Oracle Cloud production install path.
# This keeps the Phase 4 controller footprint small while preserving the
# ClusterSecretStore-based OCI Vault path planned in Phase 5.

installCRDs: true
leaderElect: true
revisionHistoryLimit: 2

global:
  nodeSelector:
    kubernetes.io/os: linux

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

serviceMonitor:
  enabled: false

webhook:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 192Mi
  metrics:
    service:
      enabled: false

certController:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 192Mi
  metrics:
    service:
      enabled: false
