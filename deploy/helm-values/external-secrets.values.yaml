# Hardened single-node values for the Oracle Cloud production install path.
# This keeps the controller footprint small while preserving the
# ClusterSecretStore-based OCI Vault path used for production secrets.

installCRDs: true
leaderElect: true
revisionHistoryLimit: 2

global:
  nodeSelector:
    kubernetes.io/os: linux

image:
  digest: sha256:876e627dbee5b0edd12da49b035469d12418cd6c3c4be5e383ae6a82e8bd4565

serviceAccount:
  # ESO controllers need in-cluster Kubernetes API credentials for watches,
  # leader election, webhook serving, and cert reconciliation.
  automount: true

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

serviceMonitor:
  enabled: false

webhook:
  replicaCount: 1
  image:
    digest: sha256:876e627dbee5b0edd12da49b035469d12418cd6c3c4be5e383ae6a82e8bd4565
  serviceAccount:
    automount: true
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 192Mi
  metrics:
    service:
      enabled: false

certController:
  replicaCount: 1
  image:
    digest: sha256:876e627dbee5b0edd12da49b035469d12418cd6c3c4be5e383ae6a82e8bd4565
  serviceAccount:
    automount: true
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 192Mi
  metrics:
    service:
      enabled: false
