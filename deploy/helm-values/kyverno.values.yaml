# Production Kyverno values for the Oracle Cloud deployment path.
# Keep this file explicit and reviewable instead of relying on chart defaults for
# controller replica counts, token automount, and runtime hardening.
#
# Chart 3.7.1 does not expose first-class digest fields for the main Kyverno
# images. The helper always renders `repository:tag`, so immutable refs are
# encoded here as `repository@sha256` plus `tag=<64 hex>` to render the final
# `repo@sha256:<hex>` form.

crds:
  migration:
    image:
      defaultRegistry: ""
      registry: ""
      repository: reg.kyverno.io/kyverno/kyverno-cli@sha256
      tag: "3a7addf83897abae291361dfccbdf63cba5926c7795fe44e527883ae2237e4b8"

admissionController:
  replicas: 1
  rbac:
    serviceAccount:
      automountServiceAccountToken: true
  initContainer:
    image:
      defaultRegistry: ""
      registry: ""
      repository: reg.kyverno.io/kyverno/kyvernopre@sha256
      tag: "13bb0430078d3e36cfa3a1c905d915fb7ad1a3a936fefa75092b6a480d2e2c2e"
    pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
    securityContext:
      runAsNonRoot: true
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  container:
    image:
      defaultRegistry: ""
      registry: ""
      repository: reg.kyverno.io/kyverno/kyverno@sha256
      tag: "f3138bcbd7314b1f66984cde24ea953dc300b36a3bf2f408ac2fe2897dcc40bf"
    pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 384Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      runAsNonRoot: true
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

