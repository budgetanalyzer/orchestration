# Production Kyverno values for the Oracle Cloud deployment path.
# Keep this file explicit and reviewable instead of relying on chart defaults for
# controller replica counts, token automount, and runtime hardening.
#
# Chart 3.8.0 does not expose first-class digest fields for the main Kyverno
# images. The helper always renders `repository:tag`, so immutable refs are
# encoded here as `repository@sha256` plus `tag=<64 hex>` to render the final
# `repo@sha256:<hex>` form.

crds:
  migration:
    image:
      defaultRegistry: ""
      registry: ""
      repository: reg.kyverno.io/kyverno/kyverno-cli@sha256
      tag: "1e99a199adb36cedddf5c3e2fc24a150e26cf2e18b9e8dfe505a3c862647a4eb"

admissionController:
  replicas: 1
  rbac:
    serviceAccount:
      automountServiceAccountToken: true
  initContainer:
    image:
      defaultRegistry: ""
      registry: ""
      repository: reg.kyverno.io/kyverno/kyvernopre@sha256
      tag: "60b53ebf646f788e6e5d312f9cbf267d7537ec14afec68bde2e1dad55c552cc7"
    pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
    securityContext:
      runAsNonRoot: true
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  container:
    image:
      defaultRegistry: ""
      registry: ""
      repository: reg.kyverno.io/kyverno/kyverno@sha256
      tag: "cb033c200dc85be0a4d38e1a72894038a0c067d73f1ce6aedd569f9769a3d262"
    pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 384Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      runAsNonRoot: true
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

