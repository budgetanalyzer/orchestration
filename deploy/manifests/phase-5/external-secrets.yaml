apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth0-credentials
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: budget-analyzer-oci-vault
  target:
    name: auth0-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: AUTH0_CLIENT_SECRET
      remoteRef:
        key: budget-analyzer-auth0-client-secret
---
