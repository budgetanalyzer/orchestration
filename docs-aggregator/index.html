<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Analyzer API Docs</title>
    <link rel="stylesheet" href="/api-docs/swagger-ui.css">
    <link rel="stylesheet" href="/api-docs/swagger-ui-overrides.css">
</head>
<body>
    <main class="docs-shell">
        <header class="docs-header">
            <p class="docs-kicker">Budget Analyzer</p>
            <h1>Unified API Documentation</h1>
            <p class="docs-summary">
                Read-only Swagger UI backed by the checked-in unified OpenAPI contract.
            </p>
            <p class="docs-downloads">
                <a href="/api-docs/openapi.json">Download JSON</a>
                <a href="/api-docs/openapi.yaml">Download YAML</a>
            </p>
        </header>
        <section class="docs-notice" aria-label="documentation notice">
            <strong>Read-only route.</strong> "Try it out" and request submission are disabled.
        </section>
        <div id="swagger-ui"></div>
    </main>

    <script src="/api-docs/swagger-ui-bundle.js"></script>
    <script src="/api-docs/swagger-initializer.js"></script>
</body>
</html>
