          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/users/{id}:
    get:
      tags:
        - User Administration
      summary: Get user
      description: Returns a single user's details and assigned roles.
      operationId: getUser
      parameters:
        - name: id
          in: path
          description: User ID
          required: true
          schema:
            type: string
          example: usr_abc123
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
components:
  schemas:
    UpdateSavedViewRequest:
      type: object
      description: Request to update a saved view
      properties:
        name:
          type: string
          description: New name for the view
          example: SF Trip December 2024
          maxLength: 255
          minLength: 0
        criteria:
          $ref: '#/components/schemas/ViewCriteriaApi'
          description: New filter criteria for the view
        openEnded:
          type: boolean
          description: If true, the view includes transactions up to current date
    ViewCriteriaApi:
      type: object
      description: Filter criteria for a saved view
      properties:
        startDate:
          type: string
          format: date
          description: Start date for transaction date range
          example: '2024-12-01'
        endDate:
          type: string
          format: date
          description: End date for transaction date range (null for open-ended views)
        accountIds:
          type: array
          description: Account IDs to filter by
          items:
            type: string
          uniqueItems: true
        bankNames:
          type: array
          description: Bank names to filter by
          example:
            - Capital One
            - Truist
          items:
            type: string
          uniqueItems: true
        currencyIsoCodes:
          type: array
          description: Currency ISO codes to filter by
          example:
            - USD
            - EUR
          items:
            type: string
          uniqueItems: true
        minAmount:
          type: number
          description: Minimum transaction amount
          example: 10.0
        maxAmount:
          type: number
          description: Maximum transaction amount
          example: 500.0
        searchText:
          type: string
          description: Text to match in the transaction description
          example: coffee
    SavedViewResponse:
      type: object
      description: Saved view response
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the view
        name:
          type: string
          description: Name of the view
          example: SF Trip December 2024
        criteria:
          $ref: '#/components/schemas/ViewCriteriaApi'
          description: Filter criteria for the view
        openEnded:
          type: boolean
          description: If true, the view includes transactions up to the current date
        pinnedCount:
          type: integer
          format: int32
          description: Number of pinned transactions
        excludedCount:
          type: integer
          format: int32
          description: Number of excluded transactions
        transactionCount:
          type: integer
          format: int64
          description: Total number of transactions matching this view
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the view was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the view was last updated
      required:
        - createdAt
        - criteria
        - excludedCount
        - id
        - name
        - openEnded
        - pinnedCount
        - transactionCount
        - updatedAt
    ApiErrorResponse:
      description: Standard API error response format
      properties:
        type:
          type: string
          description: Error type categorization for API responses
          enum:
            - INVALID_REQUEST
            - VALIDATION_ERROR
            - NOT_FOUND
            - APPLICATION_ERROR
            - SERVICE_UNAVAILABLE
            - INTERNAL_ERROR
            - UNAUTHORIZED
            - FORBIDDEN
          example: APPLICATION_ERROR
        message:
          type: string
          description: Human-readable message describing the error
          example: 'CSV format: fake-bank not supported'
        code:
          type: string
          description: Machine-readable error code for specific application errors
            (required for APPLICATION_ERROR type)
          example: CSV_PARSING_ERROR
        fieldErrors:
          type: array
          description: List of field-level validation errors (populated for VALIDATION_ERROR
            type)
          items:
            $ref: '#/components/schemas/FieldError'
      required:
        - message
        - type
    FieldError:
      description: Field-level validation error details
      properties:
        index:
          type: integer
          format: int32
          description: Zero-based index of the item in a batch/list that caused the
            error. Null for single-item validation errors.
          example: 44
        field:
          type: string
          description: Field that triggered the error
          example: email
        message:
          type: string
          description: Error message
          example: must be a valid email address
        rejectedValue:
          type: object
          description: Value that caused the error
          example: invalid@email
      required:
        - field
        - message
    UpdateStatementFormatRequest:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 100
          minLength: 0
        bankName:
          type: string
          maxLength: 100
          minLength: 0
        defaultCurrencyIsoCode:
          type: string
          maxLength: 3
          minLength: 3
        dateHeader:
          type: string
          maxLength: 50
          minLength: 0
        dateFormat:
          type: string
          maxLength: 50
          minLength: 0
        descriptionHeader:
          type: string
          maxLength: 50
          minLength: 0
        creditHeader:
          type: string
          maxLength: 50
          minLength: 0
        debitHeader:
          type: string
          maxLength: 50
          minLength: 0
        typeHeader:
          type: string
          maxLength: 50
          minLength: 0
        categoryHeader:
          type: string
          maxLength: 50
          minLength: 0
        enabled:
          type: boolean
    StatementFormatResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        formatKey:
          type: string
        displayName:
          type: string
        formatType:
          type: string
          enum:
            - CSV
            - PDF
            - XLSX
        bankName:
          type: string
        defaultCurrencyIsoCode:
          type: string
        dateHeader:
          type: string
        dateFormat:
          type: string
        descriptionHeader:
          type: string
        creditHeader:
          type: string
        debitHeader:
          type: string
        typeHeader:
          type: string
        categoryHeader:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the statement format was created
          example: '2026-04-08T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the statement format was last updated
          example: '2026-04-08T10:45:00Z'
        createdBy:
          type: string
          description: User ID that created this statement format
          example: usr_admin123
        updatedBy:
          type: string
          description: User ID that last updated this statement format
          example: usr_admin456
      required:
        - createdAt
    CreateSavedViewRequest:
      type: object
      description: Request to create a new saved view
      properties:
        name:
          type: string
          description: Name of the saved view
          example: SF Trip December 2024
          maxLength: 255
          minLength: 0
        criteria:
          $ref: '#/components/schemas/ViewCriteriaApi'
          description: Filter criteria for the view
        openEnded:
          type: boolean
          description: If true, the view includes transactions up to current date
          example: false
      required:
        - criteria
        - name
    PreviewResponse:
      type: object
      description: Response from transaction preview containing extracted transactions
      properties:
        sourceFile:
          type: string
          description: Original filename of the uploaded file
          example: cap-one-2024.csv
        detectedFormat:
          type: string
          description: Detected format key used for parsing (informational)
          example: capital-one-ytd
        transactions:
          type: array
          description: List of extracted transactions ready for review
          items:
            $ref: '#/components/schemas/PreviewTransaction'
        warnings:
          type: array
          description: List of warnings for fields with potential issues. Empty for
            CSV extraction; populated for PDF extraction where OCR confidence may
            be low.
          items:
            $ref: '#/components/schemas/PreviewWarning'
    PreviewTransaction:
      type: object
      description: Previewed transaction data before import
      properties:
        date:
          type: string
          format: date
          description: Date of the transaction
          example: '2024-04-12'
        description:
          type: string
          description: Description of the transaction
          example: 'TAQUERIA DEL SOL #3'
          minLength: 1
        amount:
          type: number
          description: Amount of the transaction
          example: 55.12
        type:
          type: string
          description: Type of the transaction
          enum:
            - CREDIT
            - DEBIT
          example: DEBIT
        category:
          type: string
          description: Category extracted from source data
          example: Dining
        bankName:
          type: string
          description: Name of the bank
          example: Capital One
          minLength: 1
        currencyIsoCode:
          type: string
          description: ISO currency code
          example: USD
          minLength: 1
        accountId:
          type: string
          description: Account identifier (may be null)
          example: checking-12345
      required:
        - amount
        - bankName
        - currencyIsoCode
        - date
        - description
        - type
    PreviewWarning:
      type: object
      description: Warning for a specific field in a previewed transaction
      properties:
        index:
          type: integer
          format: int32
          description: Zero-based index of the transaction in the preview list
          example: 12
        field:
          type: string
          description: Name of the field with the warning
          example: amount
        message:
          type: string
          description: Warning message
          example: OCR confidence low
    BulkDeleteRequest:
      type: object
      description: Request to bulk delete multiple transactions
      properties:
        ids:
          type: array
          description: List of transaction IDs to delete
          example:
            - 1
            - 2
            - 3
          items:
            type: integer
            format: int64
          minItems: 1
      required:
        - ids
    BulkDeleteResponse:
      type: object
      description: Response from bulk delete operation
      properties:
        deletedCount:
          type: integer
          format: int32
          description: Number of transactions successfully deleted
          example: 5
        notFoundIds:
          type: array
          description: List of transaction IDs that were not found or already deleted
          example:
            - 999
            - 1000
          items:
            type: integer
            format: int64
    BatchImportRequest:
      type: object
      description: Request for batch importing transactions
      properties:
        transactions:
          type: array
          description: List of transactions to import
          items:
            $ref: '#/components/schemas/PreviewTransaction'
          minItems: 1
      required:
        - transactions
    BatchImportResponse:
      type: object
      description: Response from batch transaction import
      properties:
        created:
          type: integer
          format: int32
          description: Number of transactions created
          example: 156
        duplicatesSkipped:
          type: integer
          format: int32
          description: Number of duplicates skipped
          example: 3
        transactions:
          type: array
          description: List of created transactions with IDs
          items:
            $ref: '#/components/schemas/TransactionResponse'
    TransactionResponse:
      type: object
      description: Transaction response representing a financial transaction
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the transaction
          example: 1
        ownerId:
          type: string
          description: ID of the user who owns this transaction
          example: usr_test123
        accountId:
          type: string
          description: Identifier for the account associated with the transaction
          example: checking-3223
        bankName:
          type: string
          description: Name of the bank where the transaction occurred
          example: Capital One
        date:
          type: string
          format: date
          description: Date of the transaction
          example: '2025-10-14'
        currencyIsoCode:
          type: string
          description: ISO currency code for the transaction
          example: USD
        amount:
          type: number
          description: Amount of the transaction
          example: 100.5
        type:
          type: string
          description: Type of the transaction
          enum:
            - CREDIT
            - DEBIT
          example: DEBIT
        description:
          type: string
          description: Description of the transaction
          example: Grocery shopping
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the transaction was created
          example: '2025-10-14T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the transaction was last updated
          example: '2025-10-14T10:30:00Z'
      required:
        - amount
        - bankName
        - createdAt
        - currencyIsoCode
        - date
        - description
        - id
        - ownerId
        - type
        - updatedAt
    CreateStatementFormatRequest:
      type: object
      properties:
        formatKey:
          type: string
          maxLength: 50
          minLength: 0
          pattern: ^[a-z0-9-]+$
        displayName:
          type: string
          maxLength: 100
          minLength: 0
        formatType:
          type: string
          enum:
            - CSV
            - PDF
            - XLSX
        bankName:
          type: string
          maxLength: 100
          minLength: 0
        defaultCurrencyIsoCode:
          type: string
          maxLength: 3
          minLength: 3
        dateHeader:
          type: string
          maxLength: 50
          minLength: 0
        dateFormat:
          type: string
          maxLength: 50
          minLength: 0
        descriptionHeader:
          type: string
          maxLength: 50
          minLength: 0
        creditHeader:
          type: string
          maxLength: 50
          minLength: 0
        debitHeader:
          type: string
          maxLength: 50
          minLength: 0
        typeHeader:
          type: string
          maxLength: 50
          minLength: 0
        categoryHeader:
          type: string
          maxLength: 50
          minLength: 0
      required:
        - bankName
        - defaultCurrencyIsoCode
        - displayName
        - formatKey
        - formatType
    TransactionUpdateRequest:
      type: object
      description: Request to update a transaction's mutable fields
      properties:
        description:
          type: string
          description: Updated description for the transaction
          example: Whole Foods - groceries for dinner party
          maxLength: 500
          minLength: 0
        accountId:
          type: string
          description: Updated account ID to associate with the transaction
          example: checking-12345
          maxLength: 100
          minLength: 0
    ViewMembershipResponse:
      type: object
      description: Transaction IDs grouped by membership type in a saved view. Only
        includes active (non-deleted) transactions.
      properties:
        matched:
          type: array
          description: IDs of active transactions matching view criteria (excluding
            excluded IDs)
          example:
            - 123
            - 456
            - 789
          items:
            type: integer
            format: int64
        pinned:
          type: array
          description: IDs of active transactions explicitly pinned (excluding those
            already matched)
          example:
            - 101
            - 102
          items:
            type: integer
            format: int64
        excluded:
          type: array
          description: IDs of active transactions explicitly excluded from matched
            set
          example:
            - 234
          items:
            type: integer
            format: int64
      required:
        - excluded
        - matched
        - pinned
    PageMetadataResponse:
      type: object
      description: Pagination metadata for a paged API response
      properties:
        page:
          type: integer
          format: int32
          description: Zero-based current page index
          example: 0
        size:
          type: integer
          format: int32
          description: Requested page size
          example: 50
        numberOfElements:
          type: integer
          format: int32
          description: Number of items included in the current page
          example: 50
        totalElements:
          type: integer
          format: int64
          description: Total number of matching records across all pages
          example: 12437
        totalPages:
          type: integer
          format: int32
          description: Total number of pages for the current query
          example: 249
        first:
          type: boolean
          description: Whether this is the first page
          example: true
        last:
          type: boolean
          description: Whether this is the last page
          example: false
      required:
        - first
        - last
        - numberOfElements
        - page
        - size
        - totalElements
        - totalPages
    PagedResponseTransactionResponse:
      type: object
      description: Stable paged API response wrapper
      properties:
        content:
          type: array
          description: Items included in the current page
          items:
            $ref: '#/components/schemas/TransactionResponse'
        metadata:
          $ref: '#/components/schemas/PageMetadataResponse'
          description: Pagination metadata for the current result set
      required:
        - content
        - metadata
    TransactionFilter:
      type: object
      description: Filter for querying transactions by various fields
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the transaction
          example: 1
        ownerId:
          type: string
          description: ID of the user who owns the transaction. Only effective on
            admin endpoints; ignored on user-scoped endpoints where the authenticated
            user is always applied.
          example: usr_test123
        accountId:
          type: string
          description: Identifier for the account associated with the transaction
          example: checking-3223
        bankName:
          type: string
          description: Name of the bank where the transaction occurred
          example: Capital One
        dateFrom:
          type: string
          format: date
          description: Start date for transaction date range
          example: '2025-10-01'
        dateTo:
          type: string
          format: date
          description: End date for transaction date range
          example: '2025-10-14'
        currencyIsoCode:
          type: string
          description: ISO currency code for the transaction
          example: USD
        minAmount:
          type: number
          description: Minimum transaction amount
          example: 10.0
        maxAmount:
          type: number
          description: Maximum transaction amount
          example: 500.0
        type:
          type: string
          description: Type of the transaction
          enum:
            - CREDIT
            - DEBIT
          example: DEBIT
        description:
          type: string
          description: Text to match in the transaction description
          example: Grocery
        createdAfter:
          type: string
          format: date-time
          description: Start of creation timestamp range
          example: '2025-10-14T00:00:00Z'
        createdBefore:
          type: string
          format: date-time
          description: End of creation timestamp range
          example: '2025-10-15T00:00:00Z'
        updatedAfter:
          type: string
          format: date-time
          description: Start of last update timestamp range
          example: '2025-10-14T00:00:00Z'
        updatedBefore:
          type: string
          format: date-time
          description: End of last update timestamp range
          example: '2025-10-15T00:00:00Z'
    CurrencySeriesUpdateRequest:
      type: object
      description: Request to update an existing currency series (currency code and
        provider series ID are immutable)
      properties:
        enabled:
          type: boolean
          description: Whether this currency is enabled for exchange rate access
          example: true
      required:
        - enabled
    CurrencySeriesResponse:
      type: object
      description: Currency series response with mapping details
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
          example: 1
        currencyCode:
          type: string
          description: ISO 4217 three-letter currency code
          example: EUR
        providerSeriesId:
          type: string
          description: Exchange rate provider series identifier
          example: DEXUSEU
        enabled:
          type: boolean
          description: Whether this currency is enabled for exchange rate access
          example: true
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this currency series was created
          example: '2025-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when this currency series was last updated
          example: '2025-01-15T14:45:00Z'
      required:
        - createdAt
        - currencyCode
        - enabled
        - id
        - providerSeriesId
        - updatedAt
    ExchangeRateImportResultResponse:
      type: object
      description: Exchange rate import result response for a specific currency
      properties:
        currencyCode:
          type: string
          description: ISO 4217 currency code
          example: EUR
        providerSeriesId:
          type: string
          description: Provider series ID used for this import
          example: DEXUSEU
        newRecords:
          type: integer
          format: int32
          description: Number of new exchange rates created
          example: 10
        updatedRecords:
          type: integer
          format: int32
          description: Number of exchange rates that were updated due to having a
            different rate than what we have stored- should never happen, rates shouldn't
            change
          example: 0
        skippedRecords:
          type: integer
          format: int32
          description: Number of rows in the csv that already had matching exchange
            rates created in the database
          example: 5
        earliestExchangeRateDate:
          type: string
          format: date
          description: Date of the earliest exchange rate in this import
          example: '2025-01-01'
        latestExchangeRateDate:
          type: string
          format: date
          description: Date of the latest exchange rate in this import
          example: '2025-10-31'
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the import execution
          example: '2025-10-31T15:30:00Z'
      required:
        - currencyCode
        - newRecords
        - providerSeriesId
        - skippedRecords
        - timestamp
        - updatedRecords
    CurrencySeriesCreateRequest:
      type: object
      description: Request to create a new currency series
      properties:
        currencyCode:
          type: string
          description: ISO 4217 three-letter currency code
          example: EUR
          maxLength: 3
          minLength: 3
          pattern: ^[A-Z]{3}$
        providerSeriesId:
          type: string
          description: Exchange rate provider series identifier (e.g., DEXUSEU for
            EUR/USD). Must be a valid FRED series ID.
          example: DEXUSEU
          maxLength: 50
          minLength: 0
        enabled:
          type: boolean
          default: true
          description: Whether this currency is enabled for exchange rate access
          example: true
      required:
        - currencyCode
        - providerSeriesId
    ExchangeRateResponse:
      type: object
      description: Exchange rate response
      properties:
        baseCurrency:
          type: string
          description: Base currency (1 unit of base = rate units of target, currently
            only USD supported)
          example: USD
        targetCurrency:
          type: string
          description: Target currency
          example: THB
        date:
          type: string
          format: date
          description: Date for the given rate
          example: '2025-11-02'
        rate:
          type: number
          description: Exchange rate for the given date
          example: 32.68
        publishedDate:
          type: string
          format: date
          description: Date the exchange rate was published. FRED doesn't publish
            rates for weekends and holidays, so we use the nearest previously published
            rate
          example: '2025-10-31'
      required:
        - baseCurrency
        - date
        - publishedDate
        - rate
        - targetCurrency
    UserDeactivationResponse:
      type: object
      properties:
        userId:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - DEACTIVATED
        rolesRemoved:
          type: integer
          format: int32
        sessionsRevoked:
          type: boolean
    PagedResponseUserSummaryResponse:
      type: object
      description: Stable paged API response wrapper
      properties:
        content:
          type: array
          description: Items included in the current page
          items:
            $ref: '#/components/schemas/UserSummaryResponse'
        metadata:
          $ref: '#/components/schemas/PageMetadataResponse'
          description: Pagination metadata for the current result set
      required:
        - content
        - metadata
    UserSummaryResponse:
      type: object
      description: Summary representation of a user for list views
      properties:
        id:
          type: string
          description: Internal user ID
          example: usr_abc123
        idpSub:
          type: string
          description: Identity provider subject identifier
          example: auth0|67fd70c38eb9d43f1c93ea44
        email:
          type: string
          description: User email address
          example: admin@example.com
        displayName:
          type: string
          description: Display name
          example: Admin User
        status:
          type: string
          description: Current user status
          enum:
            - ACTIVE
            - DEACTIVATED
          example: ACTIVE
        roleIds:
          type: array
          description: Assigned role IDs
          example:
            - ADMIN
          items:
            type: string
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: '2026-04-01T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: '2026-04-08T12:00:00Z'
        deactivatedAt:
          type: string
          format: date-time
          description: Deactivation timestamp
          example: '2026-04-08T12:00:00Z'
    UserDetailResponse:
