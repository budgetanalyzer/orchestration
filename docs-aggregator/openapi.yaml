openapi: 3.1.0
info:
  title: Budget Analyzer - Unified API
  version: '1.0'
  description: 'Unified API documentation for all Budget Analyzer microservices. This
    specification combines the Transaction Service, Currency Service, and Permission
    Service into a single document for client code generation.


    All endpoints are served under the `/api` base path.'
  contact:
    name: Bleu Rubin
    email: contact@budgetanalyzer.org
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://app.budgetanalyzer.localhost/api
    description: Local environment (via gateway)
  - url: https://api.budgetanalyzer.org
    description: Production environment
tags:
  - name: Saved Views
    description: Create and manage saved transaction views
    x-service: transaction-service
  - name: Statement Formats
    description: Manage statement format configurations for imports
    x-service: transaction-service
  - name: Transactions
    description: Import and manipulate transactions
    x-service: transaction-service
  - name: Currency Series
    description: Endpoints for querying, creating, and updating currency series
    x-service: currency-service
  - name: Exchange Rates
    description: Endpoints for querying and importing exchange rates
    x-service: currency-service
  - name: User Administration
    description: User administration operations
    x-service: permission-service
paths:
  /v1/views/{id}:
    get:
      tags:
        - Saved Views
      summary: Get a saved view
      description: Gets a saved view by ID
      operationId: getView
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedViewResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    put:
      tags:
        - Saved Views
      summary: Update a saved view
      description: Updates a saved view's name or criteria
      operationId: updateView
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSavedViewRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedViewResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    delete:
      tags:
        - Saved Views
      summary: Delete a saved view
      description: Deletes a saved view
      operationId: deleteView
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/statement-formats/{formatKey}:
    get:
      tags:
        - Statement Formats
      summary: Get statement format details
      description: Returns details of a specific statement format by its format key.
      operationId: getFormat
      parameters:
        - name: formatKey
          in: path
          description: Unique format identifier
          required: true
          schema:
            type: string
          example: capital-one
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementFormatResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    put:
      tags:
        - Statement Formats
      summary: Update a statement format
      description: Updates an existing statement format. Only provided fields will
        be updated. The format key and format type cannot be changed after creation.
      operationId: updateFormat
      parameters:
        - name: formatKey
          in: path
          description: Unique format identifier
          required: true
          schema:
            type: string
          example: capital-one
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatementFormatRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementFormatResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/views:
    get:
      tags:
        - Saved Views
      summary: List saved views
      description: Gets all saved views for the current user
      operationId: listViews
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SavedViewResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    post:
      tags:
        - Saved Views
      summary: Create a saved view
      description: Creates a new saved view for the current user
      operationId: createView
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSavedViewRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedViewResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/views/{id}/pin/{txnId}:
    post:
      tags:
        - Saved Views
      summary: Pin a transaction
      description: Pins a transaction to the view
      operationId: pinTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: txnId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedViewResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    delete:
      tags:
        - Saved Views
      summary: Unpin a transaction
      description: Removes a pin from the view
      operationId: unpinTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: txnId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedViewResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/views/{id}/exclude/{txnId}:
    post:
      tags:
        - Saved Views
      summary: Exclude a transaction
      description: Excludes a transaction from the view
      operationId: excludeTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: txnId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedViewResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    delete:
      tags:
        - Saved Views
      summary: Remove exclusion
      description: Removes an exclusion, allowing the transaction to appear if it
        matches criteria
      operationId: unexcludeTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: txnId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedViewResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/transactions/preview:
    post:
      tags:
        - Transactions
      summary: Preview transactions from a file before import
      description: Parses a CSV or PDF file and returns the extracted transactions
        for review and editing before batch import. No data is persisted. The format
        parameter is required and determines which parser to use. The response includes
        any parsing warnings.
      operationId: previewTransactions
      parameters:
        - name: format
          in: query
          description: Format key (e.g., 'capital-one-yearly' for PDF, 'capital-one'
            for CSV). Use GET /v1/statement-formats to list available formats.
          required: true
          schema:
            type: string
          example: capital-one-yearly
        - name: accountId
          in: query
          description: Account ID to pre-fill for all transactions
          required: false
          schema:
            type: string
          example: checking-12345
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or PDF file to preview
              required:
                - file
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                Format Not Supported:
                  summary: Invalid format parameter
                  description: Format Not Supported
                  value:
                    type: APPLICATION_ERROR
                    message: 'Format not supported: fake-bank'
                    code: FORMAT_NOT_SUPPORTED
                Parsing Error:
                  summary: Missing required column
                  description: Parsing Error
                  value:
                    type: APPLICATION_ERROR
                    message: Missing value for required column 'Description' at line
                      1
                    code: CSV_PARSING_ERROR
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/transactions/bulk-delete:
    post:
      tags:
        - Transactions
      summary: Bulk delete transactions
      description: Soft-deletes multiple transactions in a single operation. Returns
        the count of successfully deleted transactions and any IDs that were not found
        or already deleted.
      operationId: bulkDeleteTransactions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteRequest'
        required: true
      responses:
        '200':
          description: Some transactions not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteResponse'
              examples:
                Partial success:
                  summary: Some IDs not found
                  description: Partial success
                  value:
                    deletedCount: 2
                    notFoundIds:
                      - 999
                      - 1000
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/transactions/batch:
    post:
      tags:
        - Transactions
      summary: Import a batch of transactions
      description: Imports transactions from a batch request (typically from the preview
        endpoint after user edits). Validates all transactions upfront and rejects
        the entire batch if any fail. Duplicates (matching date + amount + description)
        are skipped.
      operationId: batchImportTransactions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchImportRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchImportResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/statement-formats:
    get:
      tags:
        - Statement Formats
      summary: List all statement formats
      description: Returns all configured statement formats (both enabled and disabled).
      operationId: listFormats
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatementFormatResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    post:
      tags:
        - Statement Formats
      summary: Create a new statement format
      description: Creates a new statement format configuration. For CSV formats,
        the column header fields (dateHeader, descriptionHeader, creditHeader) are
        required.
      operationId: createFormat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStatementFormatRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementFormatResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                Duplicate Format Key:
                  summary: Format key already exists
                  description: Duplicate Format Key
                  value:
                    type: APPLICATION_ERROR
                    message: 'Format key already exists: capital-one'
                    code: FORMAT_KEY_ALREADY_EXISTS
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
  /v1/transactions/{id}:
    get:
      tags:
        - Transactions
      summary: Get transaction
      description: Get transaction by id
      operationId: getTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    delete:
      tags:
        - Transactions
      summary: Delete transaction
      description: Delete transaction by id
      operationId: deleteTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INTERNAL_ERROR
                message: Internal Server Error
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: SERVICE_UNAVAILABLE
                message: Service Unavailable
    patch:
      tags:
        - Transactions
      summary: Update transaction
      description: Updates mutable fields (description and accountId) of a transaction.
        All other fields are immutable to preserve financial data integrity.
      operationId: updateTransaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionUpdateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: NOT_FOUND
                message: Not Found
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                type: INVALID_REQUEST
                message: Bad Request
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
