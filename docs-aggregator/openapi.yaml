---
  openapi: "3.1.0"
  info: 
    title: "Budget Analyzer - Unified API"
    version: "1.0"
    description: "Unified API documentation for all Budget Analyzer microservices. This specification combines the Budget Analyzer API and Currency Service into a single document for client code generation."
    contact: 
      name: "Bleu Rubin"
      email: "contact@budgetanalyzer.org"
    license: 
      name: "MIT"
      url: "https://opensource.org/licenses/MIT"
  servers: 
    - 
      url: "https://api.budgetanalyzer.localhost/api"
      description: "Local environment (via gateway)"
    - 
      url: "https://api.bleurubin.com"
      description: "Production environment"
  tags: 
    - 
      name: "Admin - Transactions"
      description: "Admin operations for transactions"
      x-service: "transaction-service"
    - 
      name: "Transactions"
      description: "Import and manipulate transactions"
      x-service: "transaction-service"
    - 
      name: "Exchange Rates Handler"
      description: "Endpoints for querying exchange rates"
      x-service: "currency-service"
    - 
      name: "Admin - Exchange Rates Handler"
      description: "Admin endpoints for importing and managing exchange rates"
      x-service: "currency-service"
    - 
      name: "Currency Series Handler"
      description: "Endpoints for querying currency series"
      x-service: "currency-service"
    - 
      name: "Admin - Currency Series Handler"
      description: "Admin endpoints for creating and updating currency series"
      x-service: "currency-service"
  paths: 
    /v1/transactions/preview: 
      post: 
        tags: 
          - "Transactions"
        summary: "Preview transactions from a file before import"
        description: "Parses a CSV or PDF file and returns the extracted transactions for review and editing before batch import. No data is persisted. The format parameter is required and determines which parser to use. The response includes any parsing warnings."
        operationId: "previewTransactions"
        parameters: 
          - 
            name: "format"
            in: "query"
            description: "Format key (e.g., 'capital-one-yearly' for PDF, 'capital-one' for CSV). Use GET /v1/statement-formats to list available formats."
            required: true
            schema: 
              type: "string"
            example: "capital-one-yearly"
          - 
            name: "accountId"
            in: "query"
            description: "Account ID to pre-fill for all transactions"
            required: false
            schema: 
              type: "string"
            example: "checking-12345"
        requestBody: 
          content: 
            multipart/form-data: 
              schema: 
                type: "object"
                properties: 
                  file: 
                    type: "string"
                    format: "binary"
                    description: "CSV or PDF file to preview"
                required: 
                  - "file"
          required: true
        responses: 
          200: 
            description: "OK"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/PreviewResponse"
          400: 
            description: "Bad Request"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INVALID_REQUEST"
                  message: "Bad Request"
          422: 
            description: "Unprocessable Entity"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                examples: 
                  Format Not Supported: 
                    summary: "Invalid format parameter"
                    description: "Format Not Supported"
                    value: 
                      type: "APPLICATION_ERROR"
                      message: "Format not supported: fake-bank"
                      code: "FORMAT_NOT_SUPPORTED"
                  Parsing Error: 
                    summary: "Missing required column"
                    description: "Parsing Error"
                    value: 
                      type: "APPLICATION_ERROR"
                      message: "Missing value for required column 'Description' at line 1"
                      code: "CSV_PARSING_ERROR"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/transactions/bulk-delete: 
      post: 
        tags: 
          - "Transactions"
        summary: "Bulk delete transactions"
        description: "Soft-deletes multiple transactions in a single operation. Returns the count of successfully deleted transactions and any IDs that were not found or already deleted."
        operationId: "bulkDeleteTransactions"
        requestBody: 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/BulkDeleteRequest"
          required: true
        responses: 
          200: 
            description: "Some transactions not found"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/BulkDeleteResponse"
                examples: 
                  Partial success: 
                    summary: "Some IDs not found"
                    description: "Partial success"
                    value: 
                      deletedCount: 2
                      notFoundIds: 
                        - 999
                        - 1000
          400: 
            description: "Bad Request"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INVALID_REQUEST"
                  message: "Bad Request"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/transactions/batch: 
      post: 
        tags: 
          - "Transactions"
        summary: "Import a batch of transactions"
        description: "Imports transactions from a batch request (typically from the preview endpoint after user edits). Validates all transactions upfront and rejects the entire batch if any fail. Duplicates (matching date + amount + description) are skipped."
        operationId: "batchImportTransactions"
        requestBody: 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/BatchImportRequest"
          required: true
        responses: 
          201: 
            description: "Created"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/BatchImportResponse"
          400: 
            description: "Bad Request"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INVALID_REQUEST"
                  message: "Bad Request"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/admin/transactions/search: 
      post: 
        tags: 
          - "Admin - Transactions"
        summary: "Search transactions"
        description: "Paginated search over transactions"
        operationId: "searchTransactions"
        requestBody: 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TransactionFilter"
          required: true
        responses: 
          200: 
            description: "OK"
            content: 
              application/json: 
                schema: 
                  type: "array"
                  items: 
                    $ref: "#/components/schemas/TransactionResponse"
          400: 
            description: "Bad Request"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INVALID_REQUEST"
                  message: "Bad Request"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/transactions/{id}: 
      get: 
        tags: 
          - "Transactions"
        summary: "Get transaction"
        description: "Get transaction by id"
        operationId: "getTransaction"
        parameters: 
          - 
            name: "id"
            in: "path"
            required: true
            schema: 
              type: "integer"
              format: "int64"
        responses: 
          200: 
            description: "OK"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/TransactionResponse"
          404: 
            description: "Not Found"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "NOT_FOUND"
                  message: "Not Found"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
      delete: 
        tags: 
          - "Transactions"
        summary: "Delete transaction"
        description: "Delete transaction by id"
        operationId: "deleteTransaction"
        parameters: 
          - 
            name: "id"
            in: "path"
            required: true
            schema: 
              type: "integer"
              format: "int64"
        responses: 
          204: 
            description: "No Content"
          404: 
            description: "Not Found"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "NOT_FOUND"
                  message: "Not Found"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
      patch: 
        tags: 
          - "Transactions"
        summary: "Update transaction"
        description: "Updates mutable fields (description and accountId) of a transaction. All other fields are immutable to preserve financial data integrity."
        operationId: "updateTransaction"
        parameters: 
          - 
            name: "id"
            in: "path"
            required: true
            schema: 
              type: "integer"
              format: "int64"
        requestBody: 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/TransactionUpdateRequest"
          required: true
        responses: 
          200: 
            description: "OK"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/TransactionResponse"
          400: 
            description: "Bad Request"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INVALID_REQUEST"
                  message: "Bad Request"
          404: 
            description: "Not Found"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "NOT_FOUND"
                  message: "Not Found"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/transactions: 
      get: 
        tags: 
          - "Transactions"
        summary: "Get transactions"
        description: "Get all transactions"
        operationId: "getTransactions"
        responses: 
          200: 
            description: "OK"
            content: 
              application/json: 
                schema: 
                  type: "array"
                  items: 
                    $ref: "#/components/schemas/TransactionResponse"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/admin/currencies/{id}: 
      get: 
        tags: 
          - "Admin - Currency Series Handler"
        summary: "Get currency series by ID"
        description: "Retrieve a currency series by its unique identifier"
        operationId: "getById"
        parameters: 
          - 
            name: "id"
            in: "path"
            required: true
            schema: 
              type: "integer"
              format: "int64"
        responses: 
          200: 
            description: "Currency series retrieved successfully"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/CurrencySeriesResponse"
          404: 
            description: "Not Found"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "NOT_FOUND"
                  message: "Not Found"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
      put: 
        tags: 
          - "Admin - Currency Series Handler"
        summary: "Update currency series"
        description: "Update an existing currency series (currency code and provider series ID are immutable, only enabled status can be changed)"
        operationId: "update"
        parameters: 
          - 
            name: "id"
            in: "path"
            required: true
            schema: 
              type: "integer"
              format: "int64"
        requestBody: 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/CurrencySeriesUpdateRequest"
          required: true
        responses: 
          200: 
            description: "Currency series updated successfully"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/CurrencySeriesResponse"
          400: 
            description: "Bad Request"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INVALID_REQUEST"
                  message: "Bad Request"
          404: 
            description: "Not Found"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "NOT_FOUND"
                  message: "Not Found"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/admin/exchange-rates/import: 
      post: 
        tags: 
          - "Admin - Exchange Rates Handler"
        summary: "Import latest available rates from FRED"
        description: "Retrieve latest un-imported exchange rates from FRED for all enabled currencies - manually triggers daily cron job"
        operationId: "importLatestExchangeRates"
        responses: 
          200: 
            description: "OK"
            content: 
              application/json: 
                schema: 
                  type: "array"
                  items: 
                    $ref: "#/components/schemas/ExchangeRateImportResultResponse"
          400: 
            description: "Bad Request"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INVALID_REQUEST"
                  message: "Bad Request"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/admin/currencies: 
      post: 
        tags: 
          - "Admin - Currency Series Handler"
        summary: "Create a new currency series"
        description: "Create a new currency series. This endpoint is typically used when FRED adds support for new currency pairs. The 23 commonly-used currencies are already pre-populated and can be enabled via the PUT endpoint."
        operationId: "create"
        requestBody: 
          content: 
            application/json: 
              schema: 
                $ref: "#/components/schemas/CurrencySeriesCreateRequest"
          required: true
        responses: 
          201: 
            description: "Currency series created successfully"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/CurrencySeriesResponse"
          400: 
            description: "Bad Request"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INVALID_REQUEST"
                  message: "Bad Request"
          422: 
            description: "Business validation failed"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                examples: 
                  Duplicate Currency Code: 
                    summary: "Currency code already exists"
                    description: "Duplicate Currency Code"
                    value: 
                      type: "APPLICATION_ERROR"
                      message: "Currency code 'EUR' already exists"
                      code: "DUPLICATE_CURRENCY_CODE"
                  Invalid ISO 4217 Code: 
                    summary: "Currency code is not a valid ISO 4217 code"
                    description: "Invalid ISO 4217 Code"
                    value: 
                      type: "APPLICATION_ERROR"
                      message: "Invalid ISO 4217 currency code: XXX"
                      code: "INVALID_ISO_4217_CODE"
                  Invalid Provider Series ID: 
                    summary: "Provider series ID does not exist in FRED"
                    description: "Invalid Provider Series ID"
                    value: 
                      type: "APPLICATION_ERROR"
                      message: "Provider series ID 'INVALID_SERIES' does not exist in the external provider"
                      code: "INVALID_PROVIDER_SERIES_ID"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/exchange-rates: 
      get: 
        tags: 
          - "Exchange Rates Handler"
        summary: "Get exchange rates"
        description: "Get exchange rates for converting USD to the target currency"
        operationId: "getExchangeRates"
        parameters: 
          - 
            name: "startDate"
            in: "query"
            description: "Start date for exchange rates in ISO format"
            required: false
            schema: 
              type: "string"
              format: "date"
            example: "2024-01-01"
          - 
            name: "endDate"
            in: "query"
            description: "End date for exchange rates in ISO format"
            required: false
            schema: 
              type: "string"
              format: "date"
            example: "2024-12-31"
          - 
            name: "targetCurrency"
            in: "query"
            description: "Target currency of exchange rate"
            required: true
            schema: 
              type: "string"
            example: "THB"
        responses: 
          200: 
            description: "OK"
            content: 
              application/json: 
                schema: 
                  type: "array"
                  items: 
                    $ref: "#/components/schemas/ExchangeRateResponse"
          400: 
            description: "Invalid request"
            content: 
              application/json: 
                schema: 
                  type: "array"
                  items: 
                    $ref: "#/components/schemas/ExchangeRateResponse"
          422: 
            description: "Business validation failed"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                examples: 
                  No Exchange Rate Data Available: 
                    summary: "No exchange rate data exists for the requested currency"
                    description: "No Exchange Rate Data Available"
                    value: 
                      type: "APPLICATION_ERROR"
                      message: "No exchange rate data available for currency: EUR"
                      code: "NO_EXCHANGE_RATE_DATA_AVAILABLE"
                  Start Date Out of Range: 
                    summary: "Start date is before the earliest available data"
                    description: "Start Date Out of Range"
                    value: 
                      type: "APPLICATION_ERROR"
                      message: "Exchange rates for THB not available before 2000-01-03"
                      code: "START_DATE_OUT_OF_RANGE"
                  Currency Not Enabled: 
                    summary: "Currency not enabled for exchange rate data"
                    description: "Currency Not Enabled"
                    value: 
                      type: "APPLICATION_ERROR"
                      message: "Currency is not enabled: EUR"
                      code: "CURRENCY_NOT_ENABLED"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
    /v1/currencies: 
      get: 
        tags: 
          - "Currency Series Handler"
        summary: "Get all currency series"
        description: "Retrieve all currency series, optionally filtered by enabled status"
        operationId: "getAll"
        parameters: 
          - 
            name: "enabledOnly"
            in: "query"
            description: "Filter by enabled status (true = enabled only, false = all)"
            required: false
            schema: 
              type: "boolean"
              default: false
        responses: 
          200: 
            description: "OK"
            content: 
              application/json: 
                schema: 
                  type: "array"
                  items: 
                    $ref: "#/components/schemas/CurrencySeriesResponse"
          500: 
            description: "Internal Server Error"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "INTERNAL_ERROR"
                  message: "Internal Server Error"
          503: 
            description: "Service Unavailable"
            content: 
              application/json: 
                schema: 
                  $ref: "#/components/schemas/ApiErrorResponse"
                example: 
                  type: "SERVICE_UNAVAILABLE"
                  message: "Service Unavailable"
  components: 
    schemas: 
      ApiErrorResponse: 
        description: "Standard API error response format"
        properties: 
          type: 
            type: "string"
            description: "Error type categorization for API responses"
            enum: 
              - "INVALID_REQUEST"
              - "VALIDATION_ERROR"
              - "NOT_FOUND"
              - "APPLICATION_ERROR"
              - "SERVICE_UNAVAILABLE"
              - "INTERNAL_ERROR"
              - "UNAUTHORIZED"
              - "PERMISSION_DENIED"
            example: "APPLICATION_ERROR"
          message: 
            type: "string"
            description: "Human-readable message describing the error"
            example: "CSV format: fake-bank not supported"
          code: 
            type: "string"
            description: "Machine-readable error code for specific application errors (required for APPLICATION_ERROR type)"
            example: "CSV_PARSING_ERROR"
          fieldErrors: 
            type: "array"
            description: "List of field-level validation errors (populated for VALIDATION_ERROR type)"
            items: 
              $ref: "#/components/schemas/FieldError"
        required: 
          - "message"
          - "type"
      FieldError: 
        description: "Field-level validation error details"
        properties: 
          index: 
            type: "integer"
            format: "int32"
            description: "Zero-based index of the item in a batch/list that caused the error. Null for single-item validation errors."
            example: 44
          field: 
            type: "string"
            description: "Field that triggered the error"
            example: "email"
          message: 
            type: "string"
            description: "Error message"
            example: "must be a valid email address"
          rejectedValue: 
            type: "object"
            description: "Value that caused the error"
            example: "invalid@email"
        required: 
          - "field"
          - "message"
      PreviewResponse: 
        type: "object"
        description: "Response from transaction preview containing extracted transactions"
        properties: 
          sourceFile: 
            type: "string"
            description: "Original filename of the uploaded file"
            example: "cap-one-2024.csv"
          detectedFormat: 
            type: "string"
            description: "Detected format key used for parsing (informational)"
            example: "capital-one-ytd"
          transactions: 
            type: "array"
            description: "List of extracted transactions ready for review"
            items: 
              $ref: "#/components/schemas/PreviewTransaction"
          warnings: 
            type: "array"
            description: "List of warnings for fields with potential issues. Empty for CSV extraction; populated for PDF extraction where OCR confidence may be low."
            items: 
              $ref: "#/components/schemas/PreviewWarning"
      PreviewTransaction: 
        type: "object"
        description: "Previewed transaction data before import"
        properties: 
          date: 
            type: "string"
            format: "date"
            description: "Date of the transaction"
            example: "2024-04-12"
          description: 
            type: "string"
            description: "Description of the transaction"
            example: "LOPEZ TAQUERIA #3"
            minLength: 1
          amount: 
            type: "number"
            description: "Amount of the transaction"
            example: 55.12
          type: 
            type: "string"
            description: "Type of the transaction"
            enum: 
              - "CREDIT"
              - "DEBIT"
            example: "DEBIT"
          category: 
            type: "string"
            description: "Category extracted from source data"
            example: "Dining"
          bankName: 
            type: "string"
            description: "Name of the bank"
            example: "Capital One"
            minLength: 1
          currencyIsoCode: 
            type: "string"
            description: "ISO currency code"
            example: "USD"
            minLength: 1
          accountId: 
            type: "string"
            description: "Account identifier (may be null)"
            example: "checking-12345"
        required: 
          - "amount"
          - "bankName"
          - "currencyIsoCode"
          - "date"
          - "description"
          - "type"
      PreviewWarning: 
        type: "object"
        description: "Warning for a specific field in a previewed transaction"
        properties: 
          index: 
            type: "integer"
            format: "int32"
            description: "Zero-based index of the transaction in the preview list"
            example: 12
          field: 
            type: "string"
            description: "Name of the field with the warning"
            example: "amount"
          message: 
            type: "string"
            description: "Warning message"
            example: "OCR confidence low"
      BulkDeleteRequest: 
        type: "object"
        description: "Request to bulk delete multiple transactions"
        properties: 
          ids: 
            type: "array"
            description: "List of transaction IDs to delete"
            example: 
              - 1
              - 2
              - 3
            items: 
              type: "integer"
              format: "int64"
            minItems: 1
        required: 
          - "ids"
      BulkDeleteResponse: 
        type: "object"
        description: "Response from bulk delete operation"
        properties: 
          deletedCount: 
            type: "integer"
            format: "int32"
            description: "Number of transactions successfully deleted"
            example: 5
          notFoundIds: 
            type: "array"
            description: "List of transaction IDs that were not found or already deleted"
            example: 
              - 999
              - 1000
            items: 
              type: "integer"
              format: "int64"
      BatchImportRequest: 
        type: "object"
        description: "Request for batch importing transactions"
        properties: 
          transactions: 
            type: "array"
            description: "List of transactions to import"
            items: 
              $ref: "#/components/schemas/PreviewTransaction"
            minItems: 1
        required: 
          - "transactions"
      BatchImportResponse: 
        type: "object"
        description: "Response from batch transaction import"
        properties: 
          created: 
            type: "integer"
            format: "int32"
            description: "Number of transactions created"
            example: 156
          duplicatesSkipped: 
            type: "integer"
            format: "int32"
            description: "Number of duplicates skipped"
            example: 3
          transactions: 
            type: "array"
            description: "List of created transactions with IDs"
            items: 
              $ref: "#/components/schemas/TransactionResponse"
      TransactionResponse: 
        type: "object"
        description: "Transaction response representing a financial transaction"
        properties: 
          id: 
            type: "integer"
            format: "int64"
            description: "Unique identifier for the transaction"
            example: 1
          accountId: 
            type: "string"
            description: "Identifier for the account associated with the transaction"
            example: "checking-3223"
          bankName: 
            type: "string"
            description: "Name of the bank where the transaction occurred"
            example: "Capital One"
          date: 
            type: "string"
            format: "date"
            description: "Date of the transaction"
            example: "2025-10-14"
          currencyIsoCode: 
            type: "string"
            description: "ISO currency code for the transaction"
            example: "USD"
          amount: 
            type: "number"
            description: "Amount of the transaction"
            example: 100.5
          type: 
            type: "string"
            description: "Type of the transaction"
            enum: 
              - "CREDIT"
              - "DEBIT"
            example: "DEBIT"
          description: 
            type: "string"
            description: "Description of the transaction"
            example: "Grocery shopping"
          createdAt: 
            type: "string"
            format: "date-time"
            description: "Timestamp when the transaction was created"
            example: "2025-10-14T10:30:00Z"
          updatedAt: 
            type: "string"
            format: "date-time"
            description: "Timestamp when the transaction was last updated"
            example: "2025-10-14T10:30:00Z"
        required: 
          - "amount"
          - "bankName"
          - "createdAt"
          - "currencyIsoCode"
          - "date"
          - "description"
          - "id"
          - "type"
          - "updatedAt"
      TransactionFilter: 
        type: "object"
        description: "Filter for querying transactions by various fields"
        properties: 
          id: 
            type: "integer"
            format: "int64"
            description: "Unique identifier for the transaction"
            example: 1
          accountId: 
            type: "string"
            description: "Identifier for the account associated with the transaction"
            example: "checking-3223"
          bankName: 
            type: "string"
            description: "Name of the bank where the transaction occurred"
            example: "Capital One"
          dateFrom: 
            type: "string"
            format: "date"
            description: "Start date for transaction date range"
            example: "2025-10-01"
          dateTo: 
            type: "string"
            format: "date"
            description: "End date for transaction date range"
            example: "2025-10-14"
          currencyIsoCode: 
            type: "string"
            description: "ISO currency code for the transaction"
            example: "USD"
          minAmount: 
            type: "number"
            description: "Minimum transaction amount"
            example: 10
          maxAmount: 
            type: "number"
            description: "Maximum transaction amount"
            example: 500
          type: 
            type: "string"
            description: "Type of the transaction"
            enum: 
              - "CREDIT"
              - "DEBIT"
            example: "DEBIT"
          description: 
            type: "string"
            description: "Text to match in the transaction description"
            example: "Grocery"
          createdAfter: 
            type: "string"
            format: "date-time"
            description: "Start of creation timestamp range"
            example: "2025-10-14T00:00:00Z"
          createdBefore: 
            type: "string"
            format: "date-time"
            description: "End of creation timestamp range"
            example: "2025-10-15T00:00:00Z"
          updatedAfter: 
            type: "string"
            format: "date-time"
            description: "Start of last update timestamp range"
            example: "2025-10-14T00:00:00Z"
          updatedBefore: 
            type: "string"
            format: "date-time"
            description: "End of last update timestamp range"
            example: "2025-10-15T00:00:00Z"
      TransactionUpdateRequest: 
        type: "object"
        description: "Request to update a transaction's mutable fields"
        properties: 
          description: 
            type: "string"
            description: "Updated description for the transaction"
            example: "Whole Foods - groceries for dinner party"
            maxLength: 500
            minLength: 0
          accountId: 
            type: "string"
            description: "Updated account ID to associate with the transaction"
            example: "checking-12345"
            maxLength: 100
            minLength: 0
      CurrencySeriesUpdateRequest: 
        type: "object"
        description: "Request to update an existing currency series (currency code and provider series ID are immutable)"
        properties: 
          enabled: 
            type: "boolean"
            description: "Whether this currency is enabled for exchange rate access"
            example: true
        required: 
          - "enabled"
      CurrencySeriesResponse: 
        type: "object"
        description: "Currency series response with mapping details"
        properties: 
          id: 
            type: "integer"
            format: "int64"
            description: "Unique identifier"
            example: 1
          currencyCode: 
            type: "string"
            description: "ISO 4217 three-letter currency code"
            example: "EUR"
          providerSeriesId: 
            type: "string"
            description: "Exchange rate provider series identifier"
            example: "DEXUSEU"
          enabled: 
            type: "boolean"
            description: "Whether this currency is enabled for exchange rate access"
            example: true
          createdAt: 
            type: "string"
            format: "date-time"
            description: "Timestamp when this currency series was created"
            example: "2025-01-15T10:30:00Z"
          updatedAt: 
            type: "string"
            format: "date-time"
            description: "Timestamp when this currency series was last updated"
            example: "2025-01-15T14:45:00Z"
        required: 
          - "createdAt"
          - "currencyCode"
          - "enabled"
          - "id"
          - "providerSeriesId"
          - "updatedAt"
      ExchangeRateImportResultResponse: 
        type: "object"
        description: "Exchange rate import result response for a specific currency"
        properties: 
          currencyCode: 
            type: "string"
            description: "ISO 4217 currency code"
            example: "EUR"
          providerSeriesId: 
            type: "string"
            description: "Provider series ID used for this import"
            example: "DEXUSEU"
          newRecords: 
            type: "integer"
            format: "int32"
            description: "Number of new exchange rates created"
            example: 10
          updatedRecords: 
            type: "integer"
            format: "int32"
            description: "Number of exchange rates that were updated due to having a different rate than what we have stored- should never happen, rates shouldn't change"
            example: 0
          skippedRecords: 
            type: "integer"
            format: "int32"
            description: "Number of rows in the csv that already had matching exchange rates created in the database"
            example: 5
          earliestExchangeRateDate: 
            type: "string"
            format: "date"
            description: "Date of the earliest exchange rate in this import"
            example: "2025-01-01"
          latestExchangeRateDate: 
            type: "string"
            format: "date"
            description: "Date of the latest exchange rate in this import"
            example: "2025-10-31"
          timestamp: 
            type: "string"
            format: "date-time"
            description: "Timestamp of the import execution"
            example: "2025-10-31T15:30:00Z"
        required: 
          - "currencyCode"
          - "newRecords"
          - "providerSeriesId"
          - "skippedRecords"
          - "timestamp"
          - "updatedRecords"
      CurrencySeriesCreateRequest: 
        type: "object"
        description: "Request to create a new currency series"
        properties: 
          currencyCode: 
            type: "string"
            description: "ISO 4217 three-letter currency code"
            example: "EUR"
            maxLength: 3
            minLength: 3
            pattern: "^[A-Z]{3}$"
          providerSeriesId: 
            type: "string"
            description: "Exchange rate provider series identifier (e.g., DEXUSEU for EUR/USD). Must be a valid FRED series ID."
            example: "DEXUSEU"
            maxLength: 50
            minLength: 0
          enabled: 
            type: "boolean"
            default: true
            description: "Whether this currency is enabled for exchange rate access"
            example: true
        required: 
          - "currencyCode"
          - "providerSeriesId"
      ExchangeRateResponse: 
        type: "object"
        description: "Exchange rate response"
        properties: 
          baseCurrency: 
            type: "string"
            description: "Base currency for conversion (currently only USD supported)"
            example: "USD"
          targetCurrency: 
            type: "string"
            description: "Target currency for conversion (currently only THB supported)"
            example: "THB"
          date: 
            type: "string"
            format: "date"
            description: "Date for the given rate"
            example: "2025-11-02"
          rate: 
            type: "number"
            description: "Exchange rate for the given date"
            example: 32.68
          publishedDate: 
            type: "string"
            format: "date"
            description: "Date the exchange rate was published. FRED doesn't publish rates for weekends and holidays, so we use the nearest previously published rate"
            example: "2025-10-31"
        required: 
          - "baseCurrency"
          - "date"
          - "publishedDate"
          - "rate"
          - "targetCurrency"

