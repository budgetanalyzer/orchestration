        - name: displayName
          in: query
          description: Display name (case-insensitive LIKE, multi-word OR)
          required: false
          schema:
            type: string
            description: Display name (case-insensitive LIKE, multi-word OR)
            example: Admin User
          example: Admin User
        - name: idpSub
          in: query
          description: Identity provider subject identifier (exact match)
          required: false
          schema:
            type: string
            description: Identity provider subject identifier (exact match)
            example: auth0|67fd70c38eb9d43f1c93ea44
          example: auth0|67fd70c38eb9d43f1c93ea44
        - name: status
          in: query
          description: Current user status
          required: false
          schema:
            type: string
            description: Current user status
            enum:
              - ACTIVE
              - DEACTIVATED
              - ACTIVE
              - DEACTIVATED
            example: ACTIVE
          example: ACTIVE
        - name: createdAfter
          in: query
          description: Start of creation timestamp range
          required: false
          schema:
            type: string
            format: date-time
            description: Start of creation timestamp range
            example: '2026-04-01T00:00:00Z'
          example: '2026-04-01T00:00:00Z'
        - name: createdBefore
          in: query
          description: End of creation timestamp range
          required: false
          schema:
            type: string
            format: date-time
            description: End of creation timestamp range
            example: '2026-04-08T00:00:00Z'
          example: '2026-04-08T00:00:00Z'
        - name: updatedAfter
          in: query
          description: Start of last update timestamp range
          required: false
          schema:
            type: string
            format: date-time
            description: Start of last update timestamp range
            example: '2026-04-01T00:00:00Z'
          example: '2026-04-01T00:00:00Z'
        - name: updatedBefore
          in: query
          description: End of last update timestamp range
          required: false
          schema:
            type: string
            format: date-time
            description: End of last update timestamp range
            example: '2026-04-08T00:00:00Z'
          example: '2026-04-08T00:00:00Z'
        - name: page
          in: query
          description: Zero-based page index (0..N)
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: The size of the page to be returned
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
        - name: sort
          in: query
          description: 'Sorting criteria in the format: property,(asc|desc). Default
            sort order is ascending. Multiple sort criteria are supported.'
          required: false
          schema:
            type: array
            default:
              - createdAt,DESC
              - id,DESC
            items:
              type: string
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
