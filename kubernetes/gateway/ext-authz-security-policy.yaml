apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: ext-authz-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: api-route
  extAuth:
    failOpen: false
    headersToExtAuth:
      - Cookie
    http:
      backendRefs:
        - name: ext-authz
          port: 9002
      headersToBackend:
        - X-User-Id
        - X-Roles
        - X-Permissions
