apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: infrastructure
  labels:
    app: postgresql
data:
  01-init-databases.sh: |
    #!/bin/sh
    set -eu

    psql_exec() {
      local database_name="$1"
      shift

      PGPASSWORD="$POSTGRES_PASSWORD" \
      psql -X -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$database_name" "$@"
    }

    psql_query() {
      local database_name="$1"
      shift

      PGPASSWORD="$POSTGRES_PASSWORD" \
      psql -X -tA --username "$POSTGRES_USER" --dbname "$database_name" "$@"
    }

    ensure_service_role() {
      local role_name="$1"
      local role_password="$2"

      if [ "$(psql_query "$POSTGRES_DB" -c "SELECT 1 FROM pg_roles WHERE rolname = '$role_name';")" != "1" ]; then
        psql_exec "$POSTGRES_DB" -c "CREATE ROLE $role_name LOGIN;"
      fi

      printf '%s\n' "ALTER ROLE $role_name WITH LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION PASSWORD :'role_password';" | \
        psql_exec "$POSTGRES_DB" -v role_password="$role_password"
    }

    ensure_service_database() {
      local database_name="$1"
      local owner_name="$2"

      if [ "$(psql_query "$POSTGRES_DB" -c "SELECT 1 FROM pg_database WHERE datname = '$database_name';")" != "1" ]; then
        psql_exec "$POSTGRES_DB" -c "CREATE DATABASE $database_name OWNER $owner_name;"
      fi

      psql_exec "$POSTGRES_DB" \
        -c "ALTER DATABASE $database_name OWNER TO $owner_name; REVOKE CONNECT ON DATABASE $database_name FROM PUBLIC; GRANT CONNECT ON DATABASE $database_name TO $owner_name;"
      psql_exec "$database_name" \
        -c "REVOKE CREATE ON SCHEMA public FROM PUBLIC; GRANT CREATE ON SCHEMA public TO $owner_name;"
    }

    # Re-apply the bootstrap password after the SCRAM config is active so the
    # break-glass admin account is stored with the same password policy.
    printf '%s\n' "ALTER ROLE $POSTGRES_USER WITH PASSWORD :'admin_password';" | \
      psql_exec "$POSTGRES_DB" -v admin_password="$POSTGRES_PASSWORD"

    ensure_service_role "transaction_service" "$POSTGRES_TRANSACTION_SERVICE_PASSWORD"
    ensure_service_role "currency_service" "$POSTGRES_CURRENCY_SERVICE_PASSWORD"
    ensure_service_role "permission_service" "$POSTGRES_PERMISSION_SERVICE_PASSWORD"

    ensure_service_database "budget_analyzer" "transaction_service"
    ensure_service_database "currency" "currency_service"
    ensure_service_database "permission" "permission_service"
