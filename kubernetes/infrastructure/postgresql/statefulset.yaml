apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: infrastructure
  labels:
    app: postgresql
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      initContainers:
        - name: fix-tls-perms
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -eu
              cp /tls-source/tls.crt /tls/server.crt
              cp /tls-source/tls.key /tls/server.key
              chmod 600 /tls/server.key
              chown 70:70 /tls/server.crt /tls/server.key
          volumeMounts:
            - name: postgresql-tls-source
              mountPath: /tls-source
              readOnly: true
            - name: postgresql-tls
              mountPath: /tls
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-bootstrap-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-bootstrap-credentials
                  key: password
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_INITDB_ARGS
              value: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: POSTGRES_TRANSACTION_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-bootstrap-credentials
                  key: transaction-service-password
            - name: POSTGRES_CURRENCY_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-bootstrap-credentials
                  key: currency-service-password
            - name: POSTGRES_PERMISSION_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-bootstrap-credentials
                  key: permission-service-password
          args:
            - -c
            - password_encryption=scram-sha-256
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/tls/server.crt
            - -c
            - ssl_key_file=/tls/server.key
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: postgresql-tls
              mountPath: /tls
            - name: postgresql-ca
              mountPath: /tls-ca
              readOnly: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  PGPASSWORD="$POSTGRES_PASSWORD" pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d postgres &&
                  PGPASSWORD="$POSTGRES_PASSWORD" psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U "$POSTGRES_USER" -d budget_analyzer -c 'SELECT 1' &&
                  PGPASSWORD="$POSTGRES_PASSWORD" psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U "$POSTGRES_USER" -d currency -c 'SELECT 1' &&
                  PGPASSWORD="$POSTGRES_PASSWORD" psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U "$POSTGRES_USER" -d permission -c 'SELECT 1'
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init
            defaultMode: 493
        - name: postgresql-tls-source
          secret:
            secretName: infra-tls-postgresql
        - name: postgresql-tls
          emptyDir: {}
        - name: postgresql-ca
          secret:
            secretName: infra-ca
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
