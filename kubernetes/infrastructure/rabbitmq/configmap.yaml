apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: infrastructure
  labels:
    app: rabbitmq
data:
  rabbitmq.conf: |
    definitions.import_backend = local_filesystem
    definitions.local.path = /etc/rabbitmq/definitions/definitions.json
    definitions.skip_if_unchanged = true

    # TLS listener (disable plaintext AMQP)
    listeners.ssl.default = 5671
    listeners.tcp = none

    ssl_options.cacertfile = /tls-ca/ca.crt
    ssl_options.certfile = /tls/tls.crt
    ssl_options.keyfile = /tls/tls.key
    ssl_options.verify = verify_none
    ssl_options.fail_if_no_peer_cert = false

    # Logging
    log.console = true
    log.console.level = info

    # Disable deprecated management metrics collection
    # This feature is deprecated in RabbitMQ 3.13+ and will be removed
    deprecated_features.permit.management_metrics_collection = false
