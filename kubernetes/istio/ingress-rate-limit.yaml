apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: ingress-auth-local-rate-limit
  namespace: istio-ingress
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: istio-ingress-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.local_ratelimit
          typed_config:
            "@type": type.googleapis.com/udpa.type.v1.TypedStruct
            type_url: type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
            value:
              stat_prefix: auth_sensitive_local_rate_limiter
    - applyTo: VIRTUAL_HOST
      match:
        context: GATEWAY
        routeConfiguration:
          vhost:
            name: ""
            route:
              action: ANY
      patch:
        operation: MERGE
        value:
          rate_limits:
            - actions:
                - header_value_match:
                    descriptor_key: auth_path
                    descriptor_value: auth-sensitive
                    headers:
                      - name: ":authority"
                        string_match:
                          exact: app.budgetanalyzer.localhost
                      - name: ":path"
                        safe_regex_match:
                          google_re2: {}
                          regex: "^/(logout(?:/.*)?|user|auth(?:/.*)?|oauth2(?:/.*)?|login/oauth2(?:/.*)?)(?:\\?.*)?$"
          typed_per_filter_config:
            envoy.filters.http.local_ratelimit:
              "@type": type.googleapis.com/udpa.type.v1.TypedStruct
              type_url: type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
              value:
                stat_prefix: auth_sensitive_local_rate_limiter
                token_bucket:
                  max_tokens: 10000
                  tokens_per_fill: 10000
                  fill_interval: 60s
                filter_enabled:
                  runtime_key: auth_sensitive_local_rate_limit_enabled
                  default_value:
                    numerator: 100
                    denominator: HUNDRED
                filter_enforced:
                  runtime_key: auth_sensitive_local_rate_limit_enforced
                  default_value:
                    numerator: 100
                    denominator: HUNDRED
                response_headers_to_add:
                  - append: false
                    header:
                      key: x-local-rate-limit
                      value: auth-sensitive
                descriptors:
                  - entries:
                      - key: auth_path
                        value: auth-sensitive
                    token_bucket:
                      max_tokens: 10
                      tokens_per_fill: 10
                      fill_interval: 60s
