apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: istio-ingress-gateway
  namespace: istio-ingress
spec:
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: istio-ingress-gateway-config
  gatewayClassName: istio
  listeners:
    - name: https
      hostname: "*.budgetanalyzer.localhost"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: budgetanalyzer-localhost-wildcard-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: default
