apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: smoke-disallow-privileged
  annotations:
    policies.kyverno.io/title: Smoke Disallow Privileged
    policies.kyverno.io/category: Phase 0 Smoke
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Retained scoped smoke policy used by the Phase 0 verifier to prove that
      Kyverno admission is live before the full Phase 7 policy suite runs.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: disallow-privileged-in-smoke-namespaces
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  security.budgetanalyzer.io/kyverno-smoke: "true"
      validate:
        message: "Privileged pods are blocked by the Kyverno smoke policy."
        pattern:
          spec:
            containers:
              - securityContext:
                  =(privileged): false
