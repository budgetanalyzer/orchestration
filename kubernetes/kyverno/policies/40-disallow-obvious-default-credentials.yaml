apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: phase7-disallow-obvious-default-credentials
  annotations:
    policies.kyverno.io/title: Disallow Obvious Default Credentials
    policies.kyverno.io/category: Security Guardrails
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Literal credentials in workload manifests are only blocked for obviously
      weak placeholder values. Secret references remain allowed.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-obvious-default-credential-env-values
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - local-path-storage
                - kyverno
                - cert-manager
                - external-secrets
                - istio-system
                - istio-ingress
                - istio-egress
      preconditions:
        all:
          - key: "{{ request.operation || 'BACKGROUND' }}"
            operator: NotEquals
            value: DELETE
      validate:
        message: >-
          Workloads must not ship obvious default credentials as literal env
          values. Use Secret references instead.
        foreach:
          - list: request.object.spec.[ephemeralContainers, initContainers, containers][].env[]
            deny:
              conditions:
                all:
                  - key: "{{ regex_match('(?i).*(password|passwd|pwd|secret|token|apikey|api_key|username|user)$', element.name || '') }}"
                    operator: Equals
                    value: true
                  - key: "{{ regex_match('(?i)^(admin|administrator|root|password|guest|changeme|default|qwerty|123456|letmein|test|demo)$', element.value || '') }}"
                    operator: Equals
                    value: true
