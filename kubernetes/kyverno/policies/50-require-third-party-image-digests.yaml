apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: phase7-require-third-party-image-digests
  annotations:
    policies.kyverno.io/title: Require Third-Party Image Digests
    policies.kyverno.io/category: Phase 7
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Third-party workload images must be immutable digest references. The only
      local exceptions are the seven documented Tilt-built images, which may
      appear either as checked-in :latest refs or as Tilt's immutable
      :tilt-<hash> deploy tags when imagePullPolicy remains Never.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-digest-or-approved-local-image
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - local-path-storage
                - kyverno
                - istio-system
                - istio-ingress
                - istio-egress
      preconditions:
        all:
          - key: "{{ request.operation || 'BACKGROUND' }}"
            operator: NotEquals
            value: DELETE
          - key: "{{ request.object.metadata.annotations.\"sidecar.istio.io/status\" || '' }}"
            operator: Equals
            value: ""
      validate:
        message: >-
          Images must be pinned by digest unless they are one of the approved
          local Tilt-built image refs.
        foreach:
          - list: request.object.spec.containers[]
            preconditions:
              all:
                - key: "{{ element.image || '' }}"
                  operator: NotEquals
                  value: ""
            deny:
              conditions:
                all:
                  - key: "{{ regex_match('^((docker\\.io/library/)?(transaction-service|currency-service|permission-service|session-gateway|ext-authz|budget-analyzer-web|budget-analyzer-web-prod-smoke):(latest|tilt-[a-f0-9]{16}))$', element.image || '') || regex_match('^[^@]+@sha256:[a-f0-9]{64}$', element.image || '') || (regex_match('^istio-(proxy|init|validation)$', element.name || '') && (regex_match('^(docker\\.io/)?istio/proxyv2:[^@]+$', element.image || '') || regex_match('^auto$', element.image || ''))) }}"
                    operator: Equals
                    value: false
          - list: request.object.spec.initContainers[]
            preconditions:
              all:
                - key: "{{ element.image || '' }}"
                  operator: NotEquals
                  value: ""
            deny:
              conditions:
                all:
                  - key: "{{ regex_match('^((docker\\.io/library/)?(transaction-service|currency-service|permission-service|session-gateway|ext-authz|budget-analyzer-web|budget-analyzer-web-prod-smoke):(latest|tilt-[a-f0-9]{16}))$', element.image || '') || regex_match('^[^@]+@sha256:[a-f0-9]{64}$', element.image || '') || (regex_match('^istio-(proxy|init|validation)$', element.name || '') && (regex_match('^(docker\\.io/)?istio/proxyv2:[^@]+$', element.image || '') || regex_match('^auto$', element.image || ''))) }}"
                    operator: Equals
                    value: false
    - name: require-image-pull-policy-never-for-approved-local-image
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - local-path-storage
                - kyverno
                - istio-system
                - istio-ingress
                - istio-egress
      preconditions:
        all:
          - key: "{{ request.operation || 'BACKGROUND' }}"
            operator: NotEquals
            value: DELETE
      validate:
        message: >-
          Approved local Tilt-built image refs must also set imagePullPolicy to
          Never.
        foreach:
          - list: request.object.spec.containers[]
            preconditions:
              all:
                - key: "{{ element.image || '' }}"
                  operator: NotEquals
                  value: ""
                - key: "{{ regex_match('^((docker\\.io/library/)?(transaction-service|currency-service|permission-service|session-gateway|ext-authz|budget-analyzer-web|budget-analyzer-web-prod-smoke):(latest|tilt-[a-f0-9]{16}))$', element.image || '') }}"
                  operator: Equals
                  value: true
            deny:
              conditions:
                any:
                  - key: "{{ element.imagePullPolicy || '' }}"
                    operator: NotEquals
                    value: Never
          - list: request.object.spec.initContainers[]
            preconditions:
              all:
                - key: "{{ element.image || '' }}"
                  operator: NotEquals
                  value: ""
                - key: "{{ regex_match('^((docker\\.io/library/)?(transaction-service|currency-service|permission-service|session-gateway|ext-authz|budget-analyzer-web|budget-analyzer-web-prod-smoke):(latest|tilt-[a-f0-9]{16}))$', element.image || '') }}"
                  operator: Equals
                  value: true
            deny:
              conditions:
                any:
                  - key: "{{ element.imagePullPolicy || '' }}"
                    operator: NotEquals
                    value: Never
