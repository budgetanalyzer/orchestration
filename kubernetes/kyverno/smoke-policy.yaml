apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: smoke-disallow-privileged
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: disallow-privileged-in-smoke-namespaces
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  security.budgetanalyzer.io/kyverno-smoke: "true"
      validate:
        message: "Privileged pods are blocked by the Kyverno smoke policy."
        pattern:
          spec:
            containers:
              - securityContext:
                  =(privileged): false
