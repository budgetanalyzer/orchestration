apiVersion: apps/v1
kind: Deployment
metadata:
  name: missing-hardening
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: missing-hardening
  template:
    metadata:
      labels:
        app: missing-hardening
    spec:
      containers:
        - name: app
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: ["sh", "-c", "sleep 3600"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mutable-third-party-image
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mutable-third-party-image
  template:
    metadata:
      labels:
        app: mutable-third-party-image
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: nginx:1.29.4-alpine
          command: ["sh", "-c", "sleep 3600"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obvious-default-credential
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obvious-default-credential
  template:
    metadata:
      labels:
        app: obvious-default-credential
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: ["sh", "-c", "sleep 3600"]
          env:
            - name: ADMIN_PASSWORD
              value: password
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 65534
