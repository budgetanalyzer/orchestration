  - policy: phase7-require-third-party-image-digests
    rule: require-image-pull-policy-for-approved-local-tilt-image
    resources:
      - default/secure-local-tilt-workload
    kind: Deployment
    result: pass
  - policy: phase7-require-third-party-image-digests
    rule: require-image-pull-policy-for-approved-local-tilt-image
    resources:
      - default/secure-local-smoke-init-workload
    kind: Pod
    result: pass
  - policy: phase7-require-workload-automount-disabled
    rule: require-pod-automount-service-account-token-false
    resources:
      - istio-ingress/ingress-chart-managed-exception
    kind: Deployment
    result: skip
  - policy: phase7-require-workload-security-context
    rule: require-pod-runtime-default-seccomp
    resources:
      - istio-ingress/ingress-chart-managed-exception
    kind: Deployment
    result: skip
  - policy: phase7-require-third-party-image-digests
    rule: require-digest-or-approved-local-image
    resources:
      - istio-ingress/ingress-chart-managed-exception
    kind: Deployment
    result: skip
  - policy: phase7-require-third-party-image-digests
    rule: require-image-pull-policy-never-for-approved-local-latest-image
    resources:
      - istio-ingress/ingress-chart-managed-exception
    kind: Deployment
    result: skip
  - policy: phase7-require-third-party-image-digests
    rule: require-image-pull-policy-for-approved-local-tilt-image
    resources:
      - istio-ingress/ingress-chart-managed-exception
    kind: Deployment
