  securityContext:
    seccompProfile:
      type: RuntimeDefault
  initContainers:
    - name: web-prod-smoke-assets
      image: docker.io/library/budget-analyzer-web-prod-smoke:tilt-d1622efb13cae97b
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "true"]
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 65534
  containers:
    - name: app
      image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
      command: ["sh", "-c", "sleep 3600"]
