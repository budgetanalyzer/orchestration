apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-local-workload
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-local-workload
  template:
    metadata:
      labels:
        app: secure-local-workload
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init
          image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command: ["sh", "-c", "true"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 65534
      containers:
        - name: app
          image: budget-analyzer-web:latest
          imagePullPolicy: Never
          command: ["sh", "-c", "sleep 3600"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 65534
---
