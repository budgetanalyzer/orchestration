apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: tracing
data:
  config.yaml: |
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        resource:
          service.name: jaeger
        metrics:
          level: detailed
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
        logs:
          level: info

    extensions:
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133
        grpc:
          endpoint: 0.0.0.0:13132
      jaeger_query:
        storage:
          traces: badger_storage
        base_path: /jaeger
        grpc:
          endpoint: 0.0.0.0:16685
        http:
          endpoint: 0.0.0.0:16686
      jaeger_storage:
        backends:
          badger_storage:
            badger:
              directories:
                keys: /badger/keys
                values: /badger/data
              ephemeral: false
              ttl:
                spans: 72h
              metrics_update_interval: 10s

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    exporters:
      jaeger_storage_exporter:
        trace_storage: badger_storage
