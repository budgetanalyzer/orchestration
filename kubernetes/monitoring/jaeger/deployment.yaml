apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
    version: v1
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: tracing
    app.kubernetes.io/version: 2.17.0
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
      app.kubernetes.io/component: tracing
  template:
    metadata:
      labels:
        app: jaeger
        version: v1
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: tracing
        app.kubernetes.io/version: 2.17.0
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jaeger
          image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0@sha256:6266573208d665ce5c17483bce0a75d0806480d92c84766d288d0aee885ce708
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/jaeger/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: query-grpc
              containerPort: 16685
              protocol: TCP
            - name: query-http
              containerPort: 16686
              protocol: TCP
            - name: health-http
              containerPort: 13133
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: query-http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: query-http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: jaeger-config
              mountPath: /etc/jaeger
              readOnly: true
            - name: badger-storage
              mountPath: /badger
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: jaeger-config
          configMap:
            name: jaeger-config
        - name: badger-storage
          persistentVolumeClaim:
            claimName: jaeger-badger
        - name: tmp
          emptyDir: {}
