apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-default-dns-egress
  namespace: default
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-default-istiod-egress
  namespace: default
spec:
  # All current default-namespace workloads are injected via the namespace label.
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - nginx-gateway
          - ext-authz
          - session-gateway
          - transaction-service
          - currency-service
          - permission-service
          - budget-analyzer-web
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              app: istiod
      ports:
        - protocol: TCP
          port: 15012
---
