apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-jaeger-collector-ingress-from-approved-mesh-workloads
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
          podSelector:
            matchLabels:
              security.istio.io/tlsMode: istio
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress
          podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-name: istio-ingress-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-egress
          podSelector:
            matchLabels:
              istio: egress-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              security.istio.io/tlsMode: istio
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
---
