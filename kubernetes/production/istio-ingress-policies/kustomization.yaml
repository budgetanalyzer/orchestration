apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../istio/ext-authz-policy.yaml
  - ../../istio/ingress-rate-limit.yaml

patches:
  - target:
      group: networking.istio.io
      version: v1alpha3
      kind: EnvoyFilter
      name: ingress-auth-local-rate-limit
      namespace: istio-ingress
    patch: |-
      - op: replace
        path: /spec/configPatches/1/patch/value/rate_limits/0/actions/0/header_value_match/headers/0/string_match/exact
        value: demo.budgetanalyzer.org
