# Production override for the existing kube-prometheus-stack install.
# Keep the Helm release name as `prometheus-stack` so Grafana keeps the
# `prometheus-stack-grafana` Service name expected by operator port-forward
# commands.
# This file intentionally only adjusts the current Prometheus/Grafana baseline.
# Jaeger and Kiali stay out of the checked-in production path until the
# deferred internal-only observability work.
grafana:
  grafana.ini:
    server:
      domain: localhost
      root_url: http://localhost:3000
    security:
      cookie_secure: false
