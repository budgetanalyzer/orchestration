apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-service
  namespace: default
  labels:
    app: currency-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: currency-service
  template:
    metadata:
      labels:
        app: currency-service
    spec:
      serviceAccountName: currency-service
      containers:
      - name: currency-service
        image: currency-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8084
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        # Database connection
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: currency-service-postgresql-credentials
              key: url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: currency-service-postgresql-credentials
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: currency-service-postgresql-credentials
              key: password
        # RabbitMQ connection
        - name: SPRING_RABBITMQ_HOST
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: host
        - name: SPRING_RABBITMQ_PORT
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: amqp-port
        - name: SPRING_RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: username
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: password
        - name: SPRING_RABBITMQ_VIRTUAL_HOST
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: virtual-host
        # Redis connection
        - name: SPRING_DATA_REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: currency-service-redis-credentials
              key: host
        - name: SPRING_DATA_REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: currency-service-redis-credentials
              key: port
        - name: SPRING_DATA_REDIS_USERNAME
          valueFrom:
            secretKeyRef:
              name: currency-service-redis-credentials
              key: username
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: currency-service-redis-credentials
              key: password
        # FRED API Configuration
        - name: FRED_API_KEY
          valueFrom:
            secretKeyRef:
              name: fred-api-credentials
              key: api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /currency-service/actuator/health
            port: 8084
          periodSeconds: 5
          failureThreshold: 24  # 5s * 24 = 120s max startup time
        readinessProbe:
          httpGet:
            path: /currency-service/actuator/health
            port: 8084
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /currency-service/actuator/health
            port: 8084
          periodSeconds: 20
