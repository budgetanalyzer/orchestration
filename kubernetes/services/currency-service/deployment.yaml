apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-service
  namespace: default
  labels:
    app: currency-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: currency-service
  template:
    metadata:
      labels:
        app: currency-service
    spec:
      automountServiceAccountToken: false
      serviceAccountName: currency-service
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-tmp
        image: busybox:1.36.1
        command: ["sh", "-c", "touch /tmp/.restart-proc && chmod 0666 /tmp/.restart-proc"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsNonRoot: true
          runAsUser: 1001
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      containers:
      - name: currency-service
        image: currency-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8084
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        # Database connection
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: currency-service-postgresql-credentials
              key: url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: currency-service-postgresql-credentials
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: currency-service-postgresql-credentials
              key: password
        # RabbitMQ connection
        - name: SPRING_RABBITMQ_HOST
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: host
        - name: SPRING_RABBITMQ_PORT
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: amqp-port
        - name: SPRING_RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: username
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: password
        - name: SPRING_RABBITMQ_VIRTUAL_HOST
          valueFrom:
            secretKeyRef:
              name: currency-service-rabbitmq-credentials
              key: virtual-host
        - name: SPRING_RABBITMQ_SSL_ENABLED
          value: "true"
        - name: SPRING_RABBITMQ_SSL_BUNDLE
          value: "infra-ca"
        # Redis connection
        - name: SPRING_DATA_REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: currency-service-redis-credentials
              key: host
        - name: SPRING_DATA_REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: currency-service-redis-credentials
              key: port
        - name: SPRING_DATA_REDIS_USERNAME
          valueFrom:
            secretKeyRef:
              name: currency-service-redis-credentials
              key: username
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: currency-service-redis-credentials
              key: password
        - name: SPRING_DATA_REDIS_SSL_ENABLED
          value: "true"
        - name: SPRING_DATA_REDIS_SSL_BUNDLE
          value: "infra-ca"
        - name: INFRA_CA_CERT_PATH
          value: "file:/etc/ssl/infra/ca.crt"
        # FRED API Configuration
        - name: FRED_API_KEY
          valueFrom:
            secretKeyRef:
              name: fred-api-credentials
              key: api-key
        volumeMounts:
        - name: infra-ca
          mountPath: /etc/ssl/infra
          readOnly: true
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsNonRoot: true
          runAsUser: 1001
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /currency-service/actuator/health
            port: 8084
          periodSeconds: 5
          failureThreshold: 24  # 5s * 24 = 120s max startup time
        readinessProbe:
          httpGet:
            path: /currency-service/actuator/health
            port: 8084
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /currency-service/actuator/health
            port: 8084
          periodSeconds: 20
      volumes:
      - name: infra-ca
        secret:
          secretName: infra-ca
      - name: tmp
        emptyDir: {}
