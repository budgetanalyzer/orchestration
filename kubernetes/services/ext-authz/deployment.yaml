apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-authz
  namespace: default
  labels:
    app: ext-authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-authz
  template:
    metadata:
      labels:
        app: ext-authz
    spec:
      serviceAccountName: ext-authz
      containers:
      - name: ext-authz
        image: ext-authz:latest
        imagePullPolicy: Never  # Use local Kind image
        ports:
        - containerPort: 9002
          name: http-auth
        - containerPort: 8090
          name: health
        env:
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: ext-authz-redis-credentials
              key: host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: ext-authz-redis-credentials
              key: port
        - name: REDIS_ADDR
          value: "$(REDIS_HOST):$(REDIS_PORT)"
        - name: REDIS_USERNAME
          valueFrom:
            secretKeyRef:
              name: ext-authz-redis-credentials
              key: username
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ext-authz-redis-credentials
              key: password
        - name: REDIS_TLS
          value: "false"
        - name: LOG_FORMAT
          value: "json"
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "200m"
        startupProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 2
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 10
