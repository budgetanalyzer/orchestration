apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-authz
  namespace: default
  labels:
    app: ext-authz
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-authz
  template:
    metadata:
      labels:
        app: ext-authz
        version: v1
    spec:
      automountServiceAccountToken: false
      serviceAccountName: ext-authz
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ext-authz
        image: ext-authz:latest
        imagePullPolicy: Never  # Use local Kind image
        ports:
        - containerPort: 9002
          name: http-auth
        - containerPort: 8090
          name: health
        env:
        - name: REDIS_HOST
          value: "redis.infrastructure"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_ADDR
          value: "$(REDIS_HOST):$(REDIS_PORT)"
        - name: REDIS_USERNAME
          value: "ext-authz"
        - name: REDIS_EXT_AUTHZ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ext-authz-redis-credentials
              key: password
        - name: REDIS_TLS
          value: "true"
        - name: REDIS_CA_CERT
          value: "/etc/ssl/infra/ca.crt"
        - name: SESSION_COOKIE_NAME
          value: "BA_SESSION"
        - name: LOG_FORMAT
          value: "json"
        volumeMounts:
        - name: infra-ca
          mountPath: /etc/ssl/infra
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "200m"
        startupProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 2
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 10
      volumes:
      - name: infra-ca
        secret:
          secretName: infra-ca
