apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-authz
  namespace: default
  labels:
    app: ext-authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-authz
  template:
    metadata:
      labels:
        app: ext-authz
    spec:
      serviceAccountName: ext-authz
      containers:
      - name: ext-authz
        image: ext-authz:latest
        imagePullPolicy: Never  # Use local Kind image
        ports:
        - containerPort: 9001
          name: grpc
        - containerPort: 8090
          name: health
        env:
        - name: REDIS_ADDR
          value: "redis.infrastructure:6379"
        - name: ENFORCE_MODE
          value: "true"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: password
        - name: REDIS_TLS
          value: "false"
        - name: LOG_FORMAT
          value: "json"
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "200m"
        startupProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 2
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8090
          periodSeconds: 10
