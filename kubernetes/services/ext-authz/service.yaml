apiVersion: v1
kind: Service
metadata:
  name: ext-authz
  namespace: default
  labels:
    app: ext-authz
spec:
  type: ClusterIP
  selector:
    app: ext-authz
  ports:
  - name: http-auth
    port: 9002
    targetPort: 9002
    protocol: TCP
  - name: health
    port: 8090
    targetPort: 8090
    protocol: TCP
