apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: default
  labels:
    app: nginx-gateway
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
        version: v1
    spec:
      automountServiceAccountToken: false
      serviceAccountName: nginx-gateway
      securityContext:
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: swagger-ui-assets
        image: swaggerapi/swagger-ui:v5.11.0@sha256:b02a61c633b74257d9e5141a4821451bd95f48a834acc23946c84bf81587f214
        command:
        - sh
        - -c
        - |
          cp /usr/share/nginx/html/swagger-ui.css /workdir/
          cp /usr/share/nginx/html/swagger-ui-bundle.js /workdir/
          cp /custom-docs/* /workdir/
          cp /custom-openapi-json/* /workdir/
          cp /custom-openapi-yaml/* /workdir/
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 101
          runAsNonRoot: true
          runAsUser: 101
        volumeMounts:
        - name: nginx-docs
          mountPath: /workdir
        - name: nginx-docs-config
          mountPath: /custom-docs
          readOnly: true
        - name: nginx-openapi-json-config
          mountPath: /custom-openapi-json
          readOnly: true
        - name: nginx-openapi-yaml-config
          mountPath: /custom-openapi-yaml
          readOnly: true
      - name: web-prod-smoke-assets
        image: budget-analyzer-web-prod-smoke:latest
        imagePullPolicy: Never
        command:
        - sh
        - -c
        - cp -R /prod-smoke/. /workdir/
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 101
          runAsNonRoot: true
          runAsUser: 101
        volumeMounts:
        - name: nginx-web-prod-smoke
          mountPath: /workdir
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.29.4-alpine@sha256:a6c4f61f456b85b8fdf7ec7ab28cc3e299440e6fb4a9dea520e5fd8fd440025e
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 101
          runAsNonRoot: true
          runAsUser: 101
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
        - name: nginx-includes
          mountPath: /etc/nginx/includes
          readOnly: true
        - name: nginx-docs
          mountPath: /usr/share/nginx/html/docs
          readOnly: true
        - name: nginx-web-prod-smoke
          mountPath: /usr/share/nginx/html/_prod-smoke
          readOnly: true
        - name: nginx-tmp
          mountPath: /tmp
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-gateway-config
      - name: nginx-includes
        configMap:
          name: nginx-gateway-includes
      - name: nginx-docs
        emptyDir: {}
      - name: nginx-docs-config
        configMap:
          name: nginx-gateway-docs
      - name: nginx-openapi-json-config
        configMap:
          name: nginx-gateway-openapi-json
      - name: nginx-openapi-yaml-config
        configMap:
          name: nginx-gateway-openapi-yaml
      - name: nginx-web-prod-smoke
        emptyDir: {}
      - name: nginx-tmp
        emptyDir: {}
