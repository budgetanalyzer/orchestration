apiVersion: apps/v1
kind: Deployment
metadata:
  name: permission-service
  namespace: default
  labels:
    app: permission-service
    app.kubernetes.io/framework: spring-boot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: permission-service
  template:
    metadata:
      labels:
        app: permission-service
        app.kubernetes.io/framework: spring-boot
    spec:
      automountServiceAccountToken: false
      serviceAccountName: permission-service
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-tmp
        image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
        command: ["sh", "-c", "touch /tmp/.restart-proc && chmod 0666 /tmp/.restart-proc"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsNonRoot: true
          runAsUser: 1001
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      containers:
      - name: permission-service
        image: permission-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8086
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        # Database connection
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgresql.infrastructure:5432/permission?sslmode=verify-full&sslrootcert=/etc/ssl/infra/ca.crt"
        - name: SPRING_DATASOURCE_USERNAME
          value: "permission_service"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: permission-service-postgresql-credentials
              key: password
        envFrom:
        - configMapRef:
            name: permission-service-config
        volumeMounts:
        - name: infra-ca
          mountPath: /etc/ssl/infra
          readOnly: true
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsNonRoot: true
          runAsUser: 1001
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /permission-service/actuator/health
            port: 8086
          periodSeconds: 5
          failureThreshold: 24  # 5s * 24 = 120s max startup time
        readinessProbe:
          httpGet:
            path: /permission-service/actuator/health
            port: 8086
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /permission-service/actuator/health
            port: 8086
          periodSeconds: 20
      volumes:
      - name: infra-ca
        secret:
          secretName: infra-ca
      - name: tmp
        emptyDir: {}
