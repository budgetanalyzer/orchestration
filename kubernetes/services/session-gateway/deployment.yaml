apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-gateway
  namespace: default
  labels:
    app: session-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-gateway
  template:
    metadata:
      labels:
        app: session-gateway
    spec:
      automountServiceAccountToken: false
      serviceAccountName: session-gateway
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-tmp
        image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
        command: ["sh", "-c", "touch /tmp/.restart-proc && chmod 0666 /tmp/.restart-proc"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsNonRoot: true
          runAsUser: 1001
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      containers:
      - name: session-gateway
        image: session-gateway:latest
        imagePullPolicy: Never  # Use local Kind image
        ports:
        - containerPort: 8081
          name: http
        env:
        # Spring profile
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        # Redis connection
        - name: SPRING_DATA_REDIS_HOST
          value: "redis.infrastructure"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: SPRING_DATA_REDIS_USERNAME
          value: "session-gateway"
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: session-gateway-redis-credentials
              key: password
        - name: SPRING_DATA_REDIS_SSL_ENABLED
          value: "true"
        - name: SPRING_DATA_REDIS_SSL_BUNDLE
          value: "infra-ca"
        - name: INFRA_CA_CERT_PATH
          value: "file:/etc/ssl/infra/ca.crt"
        # Permission service URL
        - name: PERMISSION_SERVICE_URL
          value: "http://permission-service:8086/permission-service"
        # Keep the legacy secret source first so the checked-in/Tilt-rendered
        # IDP config wins during upgrades if stale non-secret Auth0 keys still
        # exist in auth0-credentials.
        envFrom:
        - secretRef:
            name: auth0-credentials
        - configMapRef:
            name: session-gateway-config
        - configMapRef:
            name: session-gateway-idp-config
        volumeMounts:
        - name: infra-ca
          mountPath: /etc/ssl/infra
          readOnly: true
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsGroup: 1001
          runAsNonRoot: true
          runAsUser: 1001
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          periodSeconds: 5
          failureThreshold: 24  # 5s * 24 = 120s max startup time
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: infra-ca
        secret:
          secretName: infra-ca
      - name: tmp
        emptyDir: {}
