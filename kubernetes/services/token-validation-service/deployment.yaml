apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-validation-service
  namespace: default
  labels:
    app: token-validation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: token-validation-service
  template:
    metadata:
      labels:
        app: token-validation-service
    spec:
      containers:
      - name: token-validation-service
        image: token-validation-service:latest
        imagePullPolicy: Never  # Use local Kind image
        ports:
        - containerPort: 8088
          name: http
        env:
        # Auth0 Configuration
        - name: AUTH0_ISSUER_URI
          valueFrom:
            secretKeyRef:
              name: auth0-credentials
              key: AUTH0_ISSUER_URI
        - name: AUTH0_AUDIENCE
          valueFrom:
            secretKeyRef:
              name: auth0-credentials
              key: AUTH0_AUDIENCE
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8088
          periodSeconds: 5
          failureThreshold: 24  # 5s * 24 = 120s max startup time
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8088
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8088
          periodSeconds: 20
