apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: default
  labels:
    app: transaction-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      serviceAccountName: transaction-service
      containers:
      - name: transaction-service
        image: transaction-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        # Database connection
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: transaction-service-postgresql-credentials
              key: url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: transaction-service-postgresql-credentials
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: transaction-service-postgresql-credentials
              key: password
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        startupProbe:
          httpGet:
            path: /transaction-service/actuator/health
            port: 8082
          periodSeconds: 5
          failureThreshold: 24  # 5s * 24 = 120s max startup time
        readinessProbe:
          httpGet:
            path: /transaction-service/actuator/health
            port: 8082
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /transaction-service/actuator/health
            port: 8082
          periodSeconds: 20
