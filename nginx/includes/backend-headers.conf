# Backend Service Proxy Headers (Include File)
#
# This file contains standard HTTP headers forwarded to backend microservices.
#
# Usage:
#   location /api/v1/resource {
#       proxy_pass http://backend_service;
#       include includes/backend-headers.conf;
#   }
#
# These headers provide backend services with:
# - Client identification (IP, forwarding chain)
# - Request context (protocol, host)
# - Identity (populated by Envoy ext_authz from Redis session)

# HTTP/1.1 is required for Istio sidecar protocol detection.
# NGINX defaults to HTTP/1.0, which doesn't match Istio's filter chain
# (requires "http/1.1" or "h2c"), causing traffic to fall through to
# PassthroughCluster (no mTLS) — rejected by STRICT mTLS backends.
proxy_http_version 1.1;

# Host must be explicitly set to $proxy_host (the upstream service FQDN).
# Istio sidecar uses the Host header for outbound HTTP routing to determine
# the correct mTLS cluster. Without this, the original client Host header
# (e.g., app.budgetanalyzer.localhost) would be forwarded, which the sidecar
# cannot resolve to a mesh service — resulting in 503/connection reset.
# The original host is preserved in X-Forwarded-Host for backends that need it.
proxy_set_header Host $proxy_host;
proxy_set_header Connection "";
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# Forward identity headers (populated by Envoy ext_authz from Redis session)
proxy_set_header X-User-Id $http_x_user_id;
proxy_set_header X-Roles $http_x_roles;
proxy_set_header X-Permissions $http_x_permissions;
