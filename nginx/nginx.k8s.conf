events {
    worker_connections 1024;
}

http {
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Kubernetes DNS resolver - enables dynamic upstream resolution
    # This allows NGINX to start even when services aren't available yet
    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;
    resolver_timeout 5s;

    # WebSocket upgrade handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ========================================================================
    # RATE LIMITING
    # ========================================================================

    # Regular endpoints: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=100r/m;

    # ========================================================================
    # UPSTREAM SERVICES (Kubernetes DNS names)
    # ========================================================================

    upstream transaction_service {
        server transaction-service.default.svc.cluster.local:8082;
    }

    upstream currency_service {
        server currency-service.default.svc.cluster.local:8084;
    }

    # React dev server (in dev environment, in prod this serves static files)
    # NOTE: Using variable-based proxy_pass for dynamic DNS resolution
    # This allows NGINX to start before budget-analyzer-web is available

    # Session Gateway (BFF for browser authentication)
    upstream session_gateway {
        server session-gateway.default.svc.cluster.local:8081;
    }

    # React frontend (budget-analyzer-web)
    # NOTE: Using variable-based proxy_pass for dynamic DNS resolution
    # This allows NGINX to start before budget-analyzer-web is available

    # ========================================================================
    # API GATEWAY SERVER BLOCK (HTTP only - TLS handled by Envoy Gateway)
    # ========================================================================
    server {
        listen 8080;
        server_name _;

        # Prevent absolute redirects and port issues
        absolute_redirect off;
        port_in_redirect off;

        # Default proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ========================================================================
        # SECURITY HEADERS
        # ========================================================================

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://app.budgetanalyzer.localhost wss://app.budgetanalyzer.localhost; frame-ancestors 'self';" always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Favicon - return 204 No Content
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;
        }

        # ========================================================================
        # API ROUTES
        # ========================================================================

        # API Documentation
        location = /api/docs {
            alias /usr/share/nginx/html/docs/index.html;
            default_type text/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # OpenAPI spec files
        location ~ ^/api/docs/(openapi\.(json|yaml))$ {
            alias /usr/share/nginx/html/docs/$1;
            add_header Content-Disposition 'attachment; filename="$1"';
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # Transaction Service OpenAPI spec
        location /api/transaction-service/v3/api-docs {
            proxy_pass http://transaction_service/transaction-service/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Transaction import (larger uploads)
        location /api/v1/transactions/import {
            limit_req zone=per_ip burst=20 nodelay;
            limit_req_status 429;
            client_max_body_size 10M;

            # Use variable-based proxy_pass for dynamic DNS resolution
            set $transaction_backend "http://transaction-service.default.svc.cluster.local:8082";
            proxy_pass $transaction_backend/transaction-service/v1/transactions/import$is_args$args;

            include includes/backend-headers.conf;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # General transactions
        location /api/v1/transactions {
            limit_req zone=per_ip burst=20 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /transaction-service/v1/$1 break;
            proxy_pass http://transaction_service;
            include includes/backend-headers.conf;
        }

        # Statement formats
        location /api/v1/statement-formats {
            limit_req zone=per_ip burst=20 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /transaction-service/v1/$1 break;
            proxy_pass http://transaction_service;
            include includes/backend-headers.conf;
        }

        # Views
        location /api/v1/views {
            limit_req zone=per_ip burst=20 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /transaction-service/v1/$1 break;
            proxy_pass http://transaction_service;
            include includes/backend-headers.conf;
        }

        # Currency Service OpenAPI spec
        location /api/currency-service/v3/api-docs {
            proxy_pass http://currency_service/currency-service/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Currency endpoints
        location /api/v1/currencies {
            limit_req zone=per_ip burst=20 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /currency-service/v1/$1 break;
            proxy_pass http://currency_service;
            include includes/backend-headers.conf;
        }

        location /api/v1/exchange-rates {
            limit_req zone=per_ip burst=20 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /currency-service/v1/$1 break;
            proxy_pass http://currency_service;
            include includes/backend-headers.conf;
        }

        # ========================================================================
        # FRONTEND ROUTES (React App via Vite)
        # ========================================================================

        # Vite HMR WebSocket - requires special handling
        location /@vite/client {
            set $frontend_backend "http://budget-analyzer-web.default.svc.cluster.local:3000";
            proxy_pass $frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Vite node_modules
        location /node_modules {
            set $frontend_backend "http://budget-analyzer-web.default.svc.cluster.local:3000";
            proxy_pass $frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Static assets
        location /assets {
            set $frontend_backend "http://budget-analyzer-web.default.svc.cluster.local:3000";
            proxy_pass $frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Vite source files
        location /src {
            set $frontend_backend "http://budget-analyzer-web.default.svc.cluster.local:3000";
            proxy_pass $frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Default: Proxy to React frontend (SPA catch-all)
        location / {
            set $frontend_backend "http://budget-analyzer-web.default.svc.cluster.local:3000";
            proxy_pass $frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # WebSocket support for HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
