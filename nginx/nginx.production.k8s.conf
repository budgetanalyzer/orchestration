pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main 'remote_addr=$remote_addr proxy_addr=$realip_remote_addr xff="$http_x_forwarded_for" '
                    'xrealip="$http_x_real_ip" request="$request" '
                    'status=$status body_bytes_sent=$body_bytes_sent';
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    proxy_temp_path /tmp/proxy_temp;
    client_body_temp_path /tmp/client_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;
    resolver_timeout 5s;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 127.0.0.0/8;

    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=10r/s;

    server {
        listen 8080;
        server_name _;

        absolute_redirect off;
        port_in_redirect off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Production serves the built frontend bundle directly from NGINX and
        # applies the strict frontend policy on the normal app routes.
        include includes/security-headers-strict-csp.conf;

        location /health {
            access_log off;
            include includes/security-headers-strict-csp.conf;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;
        }

        # ========================================================================
        # PUBLIC DOCS ROUTE
        # ========================================================================

        location = /api-docs {
            include includes/security-headers-docs-csp.conf;
            alias /usr/share/nginx/html/docs/index.html;
            default_type text/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        location ~ ^/api-docs/(swagger-ui\.css|swagger-ui-bundle\.js|swagger-initializer\.js|swagger-ui-overrides\.css)$ {
            include includes/security-headers-docs-csp.conf;
            alias /usr/share/nginx/html/docs/$1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        location ~ ^/api-docs/(openapi\.(json|yaml))$ {
            include includes/security-headers-docs-csp.conf;
            alias /usr/share/nginx/html/docs/$1;
            add_header Content-Disposition 'attachment; filename="$1"';
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        location /api-docs/ {
            include includes/security-headers-docs-csp.conf;
            default_type text/plain;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            return 404;
        }

        # ========================================================================
        # API ROUTES
        # ========================================================================

        location /api/transaction-service/v3/api-docs {
            set $transaction_backend "http://transaction-service.default.svc.cluster.local:8082";
            proxy_pass $transaction_backend/transaction-service/v3/api-docs;
            include includes/backend-headers.conf;
        }

        location /api/v1/transactions/import {
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            client_max_body_size 10M;

            set $transaction_backend "http://transaction-service.default.svc.cluster.local:8082";
            proxy_pass $transaction_backend/transaction-service/v1/transactions/import$is_args$args;

            include includes/backend-headers.conf;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/v1/transactions {
            set $transaction_backend "http://transaction-service.default.svc.cluster.local:8082";
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /transaction-service/v1/$1 break;
            proxy_pass $transaction_backend;
            include includes/backend-headers.conf;
        }

        location /api/v1/statement-formats {
            set $transaction_backend "http://transaction-service.default.svc.cluster.local:8082";
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /transaction-service/v1/$1 break;
            proxy_pass $transaction_backend;
            include includes/backend-headers.conf;
        }

        location /api/v1/views {
            set $transaction_backend "http://transaction-service.default.svc.cluster.local:8082";
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /transaction-service/v1/$1 break;
            proxy_pass $transaction_backend;
            include includes/backend-headers.conf;
        }

        location /api/v1/admin/transactions/count {
            set $transaction_backend "http://transaction-service.default.svc.cluster.local:8082";
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /transaction-service/v1/$1 break;
            proxy_pass $transaction_backend;
            include includes/backend-headers.conf;
        }

        location /api/v1/admin/transactions {
            set $transaction_backend "http://transaction-service.default.svc.cluster.local:8082";
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /transaction-service/v1/$1 break;
            proxy_pass $transaction_backend;
            include includes/backend-headers.conf;
        }

        location /api/currency-service/v3/api-docs {
            set $currency_backend "http://currency-service.default.svc.cluster.local:8084";
            proxy_pass $currency_backend/currency-service/v3/api-docs;
            include includes/backend-headers.conf;
        }

        location /api/v1/currencies {
            set $currency_backend "http://currency-service.default.svc.cluster.local:8084";
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /currency-service/v1/$1 break;
            proxy_pass $currency_backend;
            include includes/backend-headers.conf;
        }

        location /api/v1/exchange-rates {
            set $currency_backend "http://currency-service.default.svc.cluster.local:8084";
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /currency-service/v1/$1 break;
            proxy_pass $currency_backend;
            include includes/backend-headers.conf;
        }

        # Permission Service user administration
        location /api/v1/users {
            set $permission_backend "http://permission-service.default.svc.cluster.local:8086";
            limit_req zone=per_ip burst=50 nodelay;
            limit_req_status 429;
            rewrite ^/api/v1/(.*)$ /permission-service/v1/$1 break;
            proxy_pass $permission_backend;
            include includes/backend-headers.conf;
        }

        # Production must not expose the local Vite/HMR route set or the
        # local-only smoke seam.
        location = /@vite/client {
            return 404;
        }

        location = /_prod-smoke {
            return 404;
        }

        location ^~ /_prod-smoke/ {
            return 404;
        }

        location = /src {
            return 404;
        }

        location ^~ /src/ {
            return 404;
        }

        location = /node_modules {
            return 404;
        }

        location ^~ /node_modules/ {
            return 404;
        }

        location ^~ /assets/ {
            include includes/security-headers-strict-csp.conf;
            root /usr/share/nginx/html;
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /login {
            include includes/security-headers-strict-csp.conf;
            root /usr/share/nginx/html;
            try_files /index.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        location = / {
            include includes/security-headers-strict-csp.conf;
            root /usr/share/nginx/html;
            try_files /index.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        location / {
            include includes/security-headers-strict-csp.conf;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
    }
}
