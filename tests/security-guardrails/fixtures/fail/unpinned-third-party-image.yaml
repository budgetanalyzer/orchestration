apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpinned-third-party-image
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unpinned-third-party-image
  template:
    metadata:
      labels:
        app: unpinned-third-party-image
    spec:
      containers:
        - name: app
          image: nginx:1.29.4-alpine
