# docker-compose.test.yml - Security preflight testing with Docker-in-Docker

services:
  dind:
    image: docker:27-dind
    privileged: true
    command:
      - --default-ulimit=nofile=1048576:1048576
    environment:
      - DOCKER_TLS_CERTDIR=
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    # Default bridge egress works in our CI/dev Docker hosts; user-defined
    # bridge networks can blackhole outbound HTTPS from runtime containers.
    network_mode: bridge
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: ../shared
      dockerfile: Dockerfile.test-env
    depends_on:
      dind:
        condition: service_healthy
    environment:
      - DOCKER_HOST=tcp://127.0.0.1:2375
    volumes:
      - test-repos:/repos
      - test-kubeconfig:/home/testuser/.kube
    # Share DinD's working network namespace instead of relying on a separate
    # user-defined bridge and container-name DNS.
    network_mode: service:dind
    tty: true
    stdin_open: true

volumes:
  test-repos:
  test-kubeconfig:
