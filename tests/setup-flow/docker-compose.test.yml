# docker-compose.test.yml - Orchestrates setup.sh flow testing with Docker-in-Docker
#
# This compose file creates:
# 1. A Docker-in-Docker container that provides the Docker daemon
# 2. A test runner container with all prerequisites installed

services:
  # Docker-in-Docker daemon
  dind:
    image: docker:27-dind
    privileged: true
    command:
      - --default-ulimit=nofile=1048576:1048576
    environment:
      - DOCKER_TLS_CERTDIR=
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    # Default bridge egress works in our CI/dev Docker hosts; user-defined
    # bridge networks can blackhole outbound HTTPS from runtime containers.
    network_mode: bridge
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Test runner with prerequisites
  test-runner:
    build:
      context: ../shared
      dockerfile: Dockerfile.test-env
    depends_on:
      dind:
        condition: service_healthy
    environment:
      - DOCKER_HOST=tcp://127.0.0.1:2375
      - SKIP_GIT_CLONE=true
      - BA_TEST_MODE=true
    volumes:
      - test-repos:/repos
      - test-kubeconfig:/home/testuser/.kube
    # Share DinD's working network namespace instead of relying on a separate
    # user-defined bridge and container-name DNS.
    network_mode: service:dind
    # Keep container running for test execution
    tty: true
    stdin_open: true

volumes:
  test-repos:
  test-kubeconfig:
