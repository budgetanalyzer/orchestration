# Kind cluster config for DinD testing
# Modified from ../../../kind-cluster-config.yaml to allow external API access

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  # Bind API server to all interfaces so test-runner container can reach it
  apiServerAddress: "0.0.0.0"
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"
nodes:
- role: control-plane
  image: kindest/node:v1.32.2@sha256:142f543559cc55d64e1ab9341df08e5ced84bd2e893736da8f51320f26f5950b
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 30443
    hostPort: 443
    protocol: TCP
